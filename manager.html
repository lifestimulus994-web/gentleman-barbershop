<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ადმინისტრატორი · Gentleman Barbershop</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/jpeg" href="barbershop-logo.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@300;400;500;600&family=Noto+Sans+Georgian:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0c0c0c;--bg-2:#131313;--card:#1a1a1a;--card-2:#202020;
  --text:#f3f1ee;--muted:#9a9893;--muted-2:#6b6a66;
  --line:rgba(255,255,255,.10);--line-2:rgba(255,255,255,.18);
  --accent:#6366f1;--ok:#3fb950;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Georgian','Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Noto Sans Georgian','Archivo',sans-serif;font-weight:800}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
.hide{display:none!important}

/* ── Login ── */
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:50;padding:20px}
.login-card{width:100%;max-width:360px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:32px}
.login-card img{width:54px;height:54px;border-radius:12px;object-fit:cover;margin-bottom:18px}
.login-card h1{font-size:1.4rem;margin-bottom:4px}
.login-card p{color:var(--muted);font-size:.85rem;font-weight:300;margin-bottom:22px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:.74rem;color:var(--muted);margin-bottom:6px}
.fld input,.fld select{width:100%;padding:12px 14px;background:var(--card-2);border:1px solid var(--line-2);border-radius:11px;color:var(--text);font-size:.95rem}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--text)}
.btn{width:100%;padding:13px;border-radius:11px;background:var(--text);color:var(--bg);font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.92rem;transition:.2s}
.btn:hover{opacity:.9}
.btn:disabled{opacity:.55;cursor:not-allowed}
.login-err{color:#e5484d;font-size:.82rem;margin-top:12px;min-height:18px}

/* ── Topbar ── */
.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:12px 18px;background:rgba(12,12,12,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:8px;font-family:'Noto Sans Georgian','Archivo';font-weight:800;font-size:.9rem}
.brand img{width:28px;height:28px;border-radius:7px;object-fit:cover}
.brand .tag{font-size:.62rem;font-weight:700;color:#c8caf6;background:rgba(99,102,241,.16);border:1px solid rgba(99,102,241,.4);padding:2px 7px;border-radius:6px}
.spacer{flex:1}
.datenav{display:flex;align-items:center;gap:6px}
.datenav button{width:32px;height:32px;border-radius:8px;border:1px solid var(--line-2);font-size:1rem;color:var(--muted);transition:.2s}
.datenav button:hover{border-color:var(--text);color:var(--text)}
.today-btn{width:auto!important;padding:0 12px!important;font-family:'Noto Sans Georgian','Archivo'!important;font-weight:600!important;font-size:.78rem!important}
.curdate{font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.95rem;min-width:200px;text-align:center}
.logout{padding:7px 13px;border:1px solid var(--line-2);border-radius:8px;font-family:'Noto Sans Georgian','Archivo';font-weight:600;font-size:.78rem;color:var(--muted);transition:.2s}
.logout:hover{border-color:#e5484d;color:#e5484d}
.add-btn{padding:7px 13px;border:1px solid var(--accent);background:rgba(99,102,241,.16);border-radius:8px;
  font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.78rem;color:#c8caf6;transition:.2s;white-space:nowrap}
.add-btn:hover{background:rgba(99,102,241,.30)}

/* ── Mobile tabs ── */
.mob-tabs{display:none}
@media(max-width:700px){
  .mob-tabs{display:flex;position:sticky;top:0;z-index:19;border-bottom:1px solid var(--line);background:var(--bg)}
  .mob-tab{flex:1;padding:11px 0;font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.82rem;
    color:var(--muted);border-bottom:2px solid transparent;transition:.15s}
  .mob-tab.active{color:var(--text);border-bottom-color:var(--accent)}
  .sched-wrap{max-height:calc(100vh - 106px)}
  .fin-wrap{display:none}
  .fin-wrap.mob-show{display:block;max-height:calc(100vh - 106px);overflow:auto}
  .sched-wrap.mob-hide{display:none}
}

/* ── Schedule table ── */
.sched-wrap{overflow:auto;max-height:calc(100vh - 58px);margin:0;background:var(--bg-2);border-bottom:1px solid var(--line)}
#sched{border-collapse:collapse;min-width:max-content;width:100%}
#sched th,#sched td{border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
#sched thead tr:first-child th{position:sticky;top:0;z-index:4;background:var(--card-2)}
#sched thead tr:last-child th{position:sticky;top:40px;z-index:3;background:var(--card)}
.tc{position:sticky;left:0;z-index:2;background:var(--bg-2)}
#sched thead .tc{z-index:6;background:var(--card-2)}
.th-time{width:66px;min-width:66px;text-align:center;font-size:.8rem;color:var(--muted);padding:0 4px;height:44px;vertical-align:middle}
.th-barber{text-align:center;font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.96rem;
  padding:6px 6px 5px;border-bottom:2px solid var(--accent)!important;white-space:nowrap;vertical-align:middle}
.th-sub{text-align:center;font-size:.76rem;color:var(--muted);font-weight:500;padding:5px 3px;white-space:nowrap;height:30px}
.td-time{width:66px;min-width:66px;padding:0 6px;font-size:.82rem;color:var(--muted-2);
  text-align:right;white-space:nowrap;height:40px;vertical-align:middle;background:var(--bg-2)}
.row-hour .td-time{color:var(--text);font-weight:700}
.row-hour{border-top:1px solid var(--line-2)!important}
/* input cells */
.td-in{padding:1px 2px;min-width:80px;vertical-align:middle}
.td-pay{padding:2px 3px;min-width:116px;white-space:nowrap;vertical-align:middle;text-align:center}
.td-done{background:rgba(63,185,80,.07)}
.ci{display:block;width:100%;height:38px;padding:2px 6px;background:none;border:none;
  color:var(--text);font-size:.9rem;font-family:inherit}
.ci:focus{background:rgba(99,102,241,.10);outline:none}
.ci::placeholder{color:var(--muted-2)}
.ci-tel{min-width:100px}
/* payment buttons */
.pbtn{padding:3px 8px;font-size:.78rem;border-radius:4px;border:1px solid var(--line-2);
  color:var(--muted);margin:1px;transition:.12s;line-height:1.5}
.pbtn:hover{border-color:var(--ok);color:var(--ok)}
.pbtn.p-on{background:rgba(63,185,80,.18);border-color:var(--ok);color:var(--ok);font-weight:700}
.td-pay-empty .pbtn{opacity:.18;pointer-events:auto}
.td-pay-empty:hover .pbtn{opacity:.7}
.del-btn{padding:2px 6px;font-size:.74rem;border-radius:3px;border:1px solid rgba(229,72,77,.4);
  color:#e5747a;margin-left:3px;transition:.12s;line-height:1.5}
.del-btn:hover{background:rgba(229,72,77,.15)}
/* continuation cell */
.td-cont{padding:3px 7px;vertical-align:middle}
.cont-bar{display:block;height:28px;border-radius:4px;background:rgba(99,102,241,.12);
  border-left:3px solid rgba(99,102,241,.5);padding:4px 6px;font-size:.7rem;
  color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* unavailable slot */
.td-unavail{background:repeating-linear-gradient(135deg,rgba(255,255,255,.018),rgba(255,255,255,.018) 3px,transparent 3px,transparent 9px);
  border-right:none!important}
/* loading state */
.sched-loading{padding:40px;text-align:center;color:var(--muted-2);font-size:.9rem}

/* ── Barber availability in header ── */
.barber-avail{margin-top:5px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.avail-off-tag{font-size:.66rem;color:#e5747a;font-weight:600}
.hours-edit-btn{font-size:.65rem;padding:2px 8px;border-radius:5px;border:1px solid rgba(99,102,241,.45);
  background:rgba(99,102,241,.14);color:#c8caf6;cursor:pointer;transition:.15s;font-family:inherit;font-weight:600}
.hours-edit-btn:hover{background:rgba(99,102,241,.28)}
.hours-edit-btn.no-hrs{border-color:var(--line-2);background:transparent;color:var(--muted)}
.hours-edit-btn.no-hrs:hover{border-color:var(--text);color:var(--text)}
.off-toggle-btn{font-size:.65rem;padding:2px 7px;border-radius:5px;border:1px solid rgba(229,72,77,.35);
  background:rgba(229,72,77,.1);color:#e5747a;cursor:pointer;transition:.15s;font-family:inherit;font-weight:600}
.off-toggle-btn:hover{background:rgba(229,72,77,.22)}
.off-toggle-btn.on{border-color:var(--line-2);background:transparent;color:var(--muted)}

/* ── Service picker ── */
.svc-cell{padding:1px 2px;min-width:120px;vertical-align:middle}
.svc-disp{display:block;width:100%;height:32px;padding:2px 7px;background:none;border:none;
  color:var(--text);font-size:.74rem;font-family:inherit;cursor:pointer;text-align:left;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-radius:4px;line-height:32px}
.svc-disp:hover{background:rgba(99,102,241,.10)}
.svc-disp.empty{color:var(--muted-2)}
.svc-drop{position:fixed;z-index:100;background:#1e1e1e;border:1px solid var(--line-2);
  border-radius:10px;padding:4px 0;min-width:215px;max-width:265px;
  box-shadow:0 8px 32px rgba(0,0,0,.65)}
.svc-item{display:flex;align-items:center;gap:9px;padding:7px 12px;cursor:pointer;transition:.1s}
.svc-item:hover{background:rgba(99,102,241,.12)}
.svc-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.svc-item .sname{flex:1;font-size:.8rem;color:var(--text)}
.svc-item .sprice{font-size:.7rem;color:var(--muted)}

/* ── Price column ── */
.td-price{padding:2px 4px;min-width:72px;vertical-align:middle;text-align:right}
.price-inp{width:76px;height:34px;padding:2px 4px;background:none;border:none;
  border-bottom:1px dashed transparent;color:var(--text);
  font-family:'Archivo','Noto Sans Georgian';font-weight:700;font-size:.9rem;
  font-variant-numeric:tabular-nums;text-align:right;cursor:text;transition:.15s;border-radius:3px}
.price-inp:focus{background:rgba(99,102,241,.10);border-bottom-color:var(--accent);outline:none}
.price-inp.price-custom{color:#fbbf24}

/* ── Financial summary ── */
.fin-wrap{padding:18px 18px 60px;max-width:1500px;margin:0 auto}
.fin-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.fin-ttl{font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.95rem}
.fin-main-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;align-items:start}
@media(max-width:1050px){.fin-main-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.fin-main-grid{grid-template-columns:1fr}}
.fin-col{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.fin-col-head{padding:10px 14px;font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.86rem;
  border-bottom:1px solid var(--line-2);background:var(--card-2);display:flex;align-items:center;justify-content:space-between;gap:8px}
/* salary table */
.fin-table{width:100%;border-collapse:collapse;font-size:.94rem}
.fin-table th{text-align:right;font-size:.68rem;color:var(--muted-2);padding:6px 8px;border-bottom:1px solid var(--line)}
.fin-table th:first-child,.fin-table td:first-child{text-align:left}
.fin-table td{padding:8px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
.fin-table td.num{text-align:right;font-family:'Archivo','Noto Sans Georgian';font-weight:700;font-variant-numeric:tabular-nums}
.fin-table tr:last-child td{border-bottom:none}
.fin-table .nm{font-weight:600}
.tot-row td{font-weight:700;background:var(--card-2);border-top:1px solid var(--line-2)}
.pct-badge{display:inline-block;font-size:.68rem;color:var(--muted);background:var(--card-2);
  border:1px solid var(--line);border-radius:4px;padding:1px 5px}
/* summary table */
.fin-sum-tbl{width:100%;border-collapse:collapse}
.fin-sum-tbl tr{border-bottom:1px solid var(--line)}
.fin-sum-tbl tr:last-child{border-bottom:none}
.fin-sum-tbl td{padding:8px 14px;font-size:.94rem;line-height:1.3}
.fin-sum-tbl td:last-child{text-align:right;font-family:'Archivo','Noto Sans Georgian';font-weight:600;font-variant-numeric:tabular-nums;min-width:80px;white-space:nowrap}
.fin-sum-tbl .s-head{background:var(--card-2)}
.fin-sum-tbl .s-head td{font-size:.68rem;color:var(--muted-2);font-weight:700;padding:5px 12px;text-transform:uppercase}
.fin-sum-tbl .s-indent td:first-child{padding-left:22px;color:var(--muted)}
.fin-sum-tbl .s-total td{font-weight:700}
.fin-sum-tbl .s-plus td:last-child{color:var(--ok)}
.fin-sum-tbl .s-minus td:last-child{color:#e5747a}
.fin-sum-tbl .s-bal td{font-weight:800;background:rgba(99,102,241,.10)}
.fin-edit-bal{background:none;border:none;border-bottom:1px dashed var(--line-2);color:var(--text);
  font-family:'Archivo','Noto Sans Georgian';font-weight:700;font-size:.84rem;
  text-align:right;width:80px;cursor:text;padding:0 0 1px}
.fin-edit-bal:focus{outline:none;border-color:var(--accent)}
/* entries */
.entry-row{display:flex;align-items:center;gap:7px;padding:9px 13px;border-bottom:1px solid var(--line);font-size:.9rem}
.entry-row:last-child{border-bottom:none}
.badge{font-size:.6rem;font-weight:700;padding:2px 5px;border-radius:4px;white-space:nowrap}
.badge.in{background:rgba(63,185,80,.16);color:#9fe0a8}
.badge.ex{background:rgba(229,72,77,.16);color:#e5747a}
.entry-row .cat{font-weight:600;flex-shrink:0}
.entry-row .lbl{color:var(--muted);font-size:.74rem;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.entry-row .amt{font-family:'Archivo','Noto Sans Georgian';font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;margin-left:auto}
.eb{padding:2px 6px;font-size:.75rem;border-radius:4px;border:1px solid var(--line-2);color:var(--muted);transition:.12s}
.eb:hover{border-color:var(--text);color:var(--text)}
.eb.del{border-color:rgba(229,72,77,.4);color:#e5747a}
.eb.del:hover{background:rgba(229,72,77,.12)}
.fin-empty{padding:18px 14px;text-align:center;color:var(--muted-2);font-size:.82rem}

/* ── Modal ── */
.modal{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.65);padding:20px}
.modal-card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;max-height:92vh;overflow:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-head h2{font-size:1.15rem}
.modal .x{font-size:1.7rem;line-height:1;color:var(--muted);width:32px;height:32px;border-radius:8px}
.modal .x:hover{color:var(--text)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal .btn{margin-top:8px}

/* ── Hours modal extras ── */
.hrs-off-note{color:#e5747a;font-size:.82rem;margin-bottom:12px;padding:8px 10px;
  background:rgba(229,72,77,.08);border:1px solid rgba(229,72,77,.2);border-radius:8px}
.hrs-actions{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.hrs-btn-danger{flex:0 0 auto;padding:10px 14px;border-radius:9px;border:1px solid rgba(229,72,77,.4);
  background:rgba(229,72,77,.1);color:#e5747a;font-family:'Noto Sans Georgian','Archivo';
  font-weight:700;font-size:.82rem;cursor:pointer;transition:.2s}
.hrs-btn-danger:hover{background:rgba(229,72,77,.2)}
.hrs-btn-muted{flex:0 0 auto;padding:10px 14px;border-radius:9px;border:1px solid var(--line-2);
  background:var(--card-2);color:var(--muted);font-family:'Noto Sans Georgian','Archivo';
  font-weight:700;font-size:.82rem;cursor:pointer;transition:.2s}
.hrs-btn-muted:hover{border-color:var(--text);color:var(--text)}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:10px 20px;font-size:.84rem;font-family:'Noto Sans Georgian','Archivo';
  box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:9999;
  transition:transform .25s,opacity .25s;opacity:0;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{border-color:#e5747a;color:#e5747a}
.toast.ok{border-color:var(--ok);color:var(--ok)}

/* barber management */
.barb-mgmt-wrap{margin:18px 0;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.barb-mgmt-head{padding:10px 14px;font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.86rem;
  border-bottom:1px solid var(--line-2);background:var(--card-2);display:flex;align-items:center;justify-content:space-between}
.barb-tbl{width:100%;border-collapse:collapse}
.barb-tbl th{padding:8px 10px;font-size:.72rem;color:var(--muted-2);font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--line-2);background:var(--card-2)}
.barb-tbl td{padding:7px 10px;font-size:.84rem;border-bottom:1px solid var(--line)}
.barb-tbl tr:last-child td{border-bottom:none}
.barb-tbl .b-inp{background:none;border:none;border-bottom:1px dashed var(--line-2);color:var(--text);font-family:'Archivo','Noto Sans Georgian';font-size:.84rem;width:100%;min-width:50px}
.barb-tbl .b-inp:focus{outline:none;border-bottom-color:var(--accent)}
.barb-active-tog{cursor:pointer;font-size:.75rem;padding:2px 8px;border-radius:4px;border:1px solid var(--line);background:var(--card-2);color:var(--muted)}
.barb-active-tog.is-active{background:rgba(99,102,241,.15);border-color:var(--accent);color:var(--accent)}
.barb-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:2px 6px}
.barb-del:hover{color:#e5747a}

</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════ -->
<div class="login" id="login">
  <div class="login-card">
    <img src="barbershop-logo.jpg" alt="Gentleman" />
    <h1>Gentleman Barbershop</h1>
    <p>ადმინისტრატორის პანელი</p>
    <div class="fld"><label>ელ. ფოსტა</label><input id="lEmail" type="email" placeholder="admin@example.com" autocomplete="email" /></div>
    <div class="fld"><label>პაროლი</label><input id="lPass" type="password" autocomplete="current-password" /></div>
    <button class="btn" id="loginBtn">შესვლა</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════ -->
<div class="hide" id="app">

  <!-- Topbar -->
  <div class="top">
    <div class="brand">
      <img src="barbershop-logo.jpg" alt="" />
      Gentleman
      <span class="tag">ADMIN</span>
    </div>
    <div class="spacer"></div>
    <div class="datenav">
      <button id="prevDay" title="წინა დღე">‹</button>
      <button id="todayBtn" class="today-btn">დღეს</button>
      <div class="curdate" id="curDate"></div>
      <button id="nextDay" title="შემდეგი დღე">›</button>
    </div>
    <div class="spacer"></div>
    <button class="logout" id="logoutBtn">გასვლა</button>
  </div>

  <!-- Mobile tab bar -->
  <div class="mob-tabs" id="mobTabs">
    <button class="mob-tab active" id="tabSched">ცხრილი</button>
    <button class="mob-tab" id="tabFin">ფინანსები</button>
  </div>

  <!-- Schedule spreadsheet -->
  <div class="sched-wrap" id="schedWrap">
    <table id="sched">
      <thead id="schedHead"></thead>
      <tbody id="schedBody"><tr><td colspan="99" class="sched-loading">იტვირთება…</td></tr></tbody>
    </table>
  </div>

  <!-- Financial summary -->
  <div class="fin-wrap" id="finWrap">
    <div class="fin-bar">
      <span class="fin-ttl">ფინანსური სარეზუმო — <span id="finDateLbl"></span></span>

<!-- ══ SERVICE PICKER DROPDOWN (shared) ══════════════ -->
<div id="svcDrop" class="svc-drop hide"></div>

<div class="toast" id="toast"></div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
'use strict';

/* ── Supabase ── */
const cfg = window.SUPABASE_CONFIG;
const sb  = window.supabase.createClient(cfg.url, cfg.anonKey);

/* ── Helpers ── */
const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

function minToHHMM(m){ return pad(Math.floor(m/60))+':'+pad(m%60); }

function dtToMin(s){
  if(!s) return 0;
  const t = (s.includes('T') ? s.split('T')[1] : s) || '0:0';
  const [h,m] = t.split(':').map(Number);
  return h*60+(m||0);
}

function timeStrToMin(s){
  const [h,m] = (s||'').split(':').map(Number);
  return (h||0)*60+(m||0);
}

function fmtDateLong(d){
  const DAYS=['კვირა','ორშაბათი','სამშაბათი','ოთხშაბათი','ხუთშაბათი','პარასკევი','შაბათი'];
  const MO=['იანვ.','თებ.','მარ.','აპრ.','მაი.','ივნ.','ივლ.','აგვ.','სექ.','ოქტ.','ნოე.','დეკ.'];
  return `${DAYS[d.getDay()]}, ${d.getDate()} ${MO[d.getMonth()]} ${d.getFullYear()}`;
}

function fmt(n){
  const v = Math.round((+n||0)*100)/100;
  return v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2})+' ₾';
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

/* ── Toast ── */
let _toastTimer=null;
function toast(msg,type='ok'){
  const el=$('toast'); if(!el) return;
  el.textContent=msg;
  el.className=`toast show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

/* ── State ── */
let curDate = new Date(); curDate.setHours(0,0,0,0);
let barbers=[], services=[], servicesMap={};
let bookings=[], finEntries=[];
let dayHoursMap={}, daysOffSet=new Set();
let nashtEntryId=null, nashtAmount=0;
const saveTimers={};
let svcDropTarget=null;
let hoursModalBarberId=null;

/* ── Service resolution ── */
function getBookingIds(bk){
  if(bk.service_ids && bk.service_ids.length) return bk.service_ids;
  if(bk.service_id) return [bk.service_id];
  return [];
}

function resolveServices(ids){
  if(!ids||!ids.length) return {ids:[],price:0,duration:0,isPkg:false,pkgName:''};
  const pkg=services.find(s=>
    s.combo_of && s.combo_of.length===ids.length &&
    ids.every(id=>s.combo_of.includes(id))
  );
  if(pkg) return {ids,price:pkg.price,duration:pkg.duration_min,isPkg:true,pkgName:pkg.name_ka};
  const svcs=ids.map(id=>servicesMap[id]).filter(Boolean);
  return {
    ids,
    price:    svcs.reduce((a,sv)=>a+sv.price,       0),
    duration: svcs.reduce((a,sv)=>a+sv.duration_min, 0),
    isPkg:false, pkgName:''
  };
}

function svcLabel(ids,resolved){
  if(!ids.length) return '';
  if(resolved.isPkg) return resolved.pkgName;
  return ids.map(id=>(servicesMap[id]?.name_ka||'').split(' ')[0]).join(' + ');
}

function bkPrice(bk){
  if(bk.custom_price!=null) return Number(bk.custom_price);
  return resolveServices(getBookingIds(bk)).price;
}

/* ── Availability ── */
function isSlotAvailable(barberId, slotMin){
  if(daysOffSet.has(barberId)) return false;
  const dh=dayHoursMap[barberId];
  if(!dh) return true;
  const open=timeStrToMin(dh.open), close=timeStrToMin(dh.close);
  return slotMin>=open && slotMin<close;
}

/* ── Service picker dropdown ── */
function openSvcDrop(el,bid,slot,bkid,selectedIds){
  svcDropTarget={el,bid,slot,bkid};
  const drop=$('svcDrop');
  const pickerSvcs=services.filter(s=>!s.combo_of||!s.combo_of.length);
  drop.innerHTML=pickerSvcs.map(sv=>
    `<label class="svc-item">
      <input type="checkbox" value="${esc(sv.id)}" ${selectedIds.includes(sv.id)?'checked':''}>
      <span class="sname">${esc(sv.name_ka)}</span>
      <span class="sprice">${sv.price}₾ · ${sv.duration_min}წთ</span>
    </label>`
  ).join('');
  const rect=el.getBoundingClientRect();
  drop.style.top=(rect.bottom+4)+'px';
  drop.style.left=Math.min(rect.left,window.innerWidth-270)+'px';
  drop.classList.remove('hide');
}

function closeSvcDrop(){
  $('svcDrop').classList.add('hide');
  svcDropTarget=null;
}

$('svcDrop').addEventListener('change',()=>{
  if(!svcDropTarget) return;
  const {el,bid,slot}=svcDropTarget;
  const ids=[...$('svcDrop').querySelectorAll('input:checked')].map(c=>c.value);
  const resolved=resolveServices(ids);
  el.dataset.svids=JSON.stringify(ids);
  el.textContent=ids.length?svcLabel(ids,resolved):'სერვ.';
  el.classList.toggle('empty',!ids.length);
  const priceCell=el.closest('td')?.nextElementSibling;
  if(priceCell&&priceCell.classList.contains('td-price')){
    const inp=priceCell.querySelector('.price-inp');
    if(inp){
      const calcP=resolveServices(ids).price;
      inp.value=calcP;
      inp.dataset.calc=calcP;
      inp.classList.remove('price-custom');
    }
  }
  const key=`${bid}_${slot}`;
  clearTimeout(saveTimers[key]);
  saveTimers[key]=setTimeout(()=>tryAutoSave(bid,slot),800);
});

document.addEventListener('click',e=>{
  if(!svcDropTarget) return;
  if($('svcDrop').contains(e.target)||e.target.closest('.svc-disp')) return;
  closeSvcDrop();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&svcDropTarget) closeSvcDrop();
});

/* ═══════════════════════════════════════════
   AUTH
═══════════════════════════════════════════ */
sb.auth.onAuthStateChange((_,sess)=>{
  if(sess){ showApp(); } else { showLogin(); }
});

$('loginBtn').addEventListener('click',async()=>{
  const email=$('lEmail').value.trim(), pass=$('lPass').value;
  $('loginErr').textContent='';
  $('loginBtn').disabled=true; $('loginBtn').textContent='შესვლა…';
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  $('loginBtn').disabled=false; $('loginBtn').textContent='შესვლა';
  if(error){ $('loginErr').textContent=error.message; }
});
$('lPass').addEventListener('keydown',e=>{ if(e.key==='Enter') $('loginBtn').click(); });
$('logoutBtn').addEventListener('click',()=>sb.auth.signOut());

function showLogin(){
  $('app').classList.add('hide');
  $('login').classList.remove('hide');
}
async function showApp(){
  $('login').classList.add('hide');
  $('app').classList.remove('hide');
  await loadMeta();
  await loadDay();
  renderAll();
  await loadAllBarbers();

  /* Realtime sync — refresh when any booking/finance changes from any source */
  sb.channel('mgr-sync')
    .on('postgres_changes',{event:'*',schema:'public',table:'bookings'},async()=>{
      if(Object.keys(saveTimers).length>0) return; // user is typing, skip
      await loadDay(); renderSchedule(); renderFinance();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'finance_entries'},async()=>{
      await loadDay(); renderFinance();
    })
    .subscribe();
}

/* ═══════════════════════════════════════════
   DATE NAVIGATION
═══════════════════════════════════════════ */
function updateDateLabel(){
  $('curDate').textContent    = fmtDateLong(curDate);
  $('finDateLbl').textContent = fmtDateLong(curDate);
}

$('prevDay').addEventListener('click',()=>{ curDate.setDate(curDate.getDate()-1); changeDay(); });
$('nextDay').addEventListener('click',()=>{ curDate.setDate(curDate.getDate()+1); changeDay(); });
$('todayBtn').addEventListener('click',()=>{ curDate=new Date(); curDate.setHours(0,0,0,0); changeDay(); });

async function changeDay(){
  updateDateLabel();
  Object.keys(saveTimers).forEach(k=>{ clearTimeout(saveTimers[k]); delete saveTimers[k]; });
  closeSvcDrop();
  await loadDay();
  renderAll();
}

/* ═══════════════════════════════════════════
   DATA LOADING
═══════════════════════════════════════════ */
async function loadMeta(){
  const [{data:b},{data:s}]=await Promise.all([
    sb.from('barbers').select('id,name_ka,commission_pct,sort,is_founder').eq('active',true).order('sort'),
    sb.from('services').select('id,name_ka,price,duration_min,sort,combo_of').eq('active',true).order('sort'),
  ]);
  barbers  =b||[];
  services =s||[];
  servicesMap=Object.fromEntries(services.map(sv=>[sv.id,sv]));
}

async function loadDay(){
  const ds=ymd(curDate);
  const [{data:bks},{data:fe},{data:dhrs},{data:offs}]=await Promise.all([
    sb.from('bookings').select('*')
      .gte('starts_at',ds+'T00:00:00').lt('starts_at',ds+'T23:59:59')
      .neq('status','cancelled'),
    sb.from('finance_entries').select('*').eq('entry_date',ds),
    sb.from('barber_day_hours').select('barber_id,open_time,close_time').eq('work_date',ds),
    sb.from('barber_days_off').select('barber_id').eq('off_date',ds),
  ]);
  bookings   =bks||[];
  finEntries =fe||[];
  dayHoursMap={};
  (dhrs||[]).forEach(r=>{ dayHoursMap[r.barber_id]={open:r.open_time,close:r.close_time}; });
  daysOffSet=new Set((offs||[]).map(o=>o.barber_id));
  const nash=finEntries.find(e=>e.category==='ნაშთი'&&e.kind==='income');
  nashtEntryId=nash?.id||null;
  nashtAmount =Number(nash?.amount)||0;
}

/* ═══════════════════════════════════════════
   SLOT MAP — start-only, no span blocking
═══════════════════════════════════════════ */
function buildSlotMaps(){
  const maps={};
  barbers.forEach(b=>{ maps[b.id]={}; });
  bookings.forEach(bk=>{
    if(!maps[bk.barber_id]) return;
    const st=dtToMin(bk.starts_at);
    maps[bk.barber_id][st]={bk,isStart:true};
  });
  return maps;
}

/* ═══════════════════════════════════════════
   RENDER SCHEDULE
═══════════════════════════════════════════ */
function renderSchedule(){
  const slotMaps=buildSlotMaps();
  const slots=[];
  for(let m=10*60; m<20*60; m+=15) slots.push(m);

  /* ── thead ── */
  let head='<tr>';
  head+=`<th class="tc th-time" rowspan="2">დრო</th>`;
  barbers.forEach(b=>{
    const isOff=daysOffSet.has(b.id);
    const dh=dayHoursMap[b.id];
    let availHtml='';
    if(isOff){
      availHtml=`<span class="avail-off-tag">❌ არ მუშაობს</span>
        <button class="off-toggle-btn on" data-offbid="${b.id}">✓ გახსნა</button>`;
    } else {
      const hrsLabel=dh
        ? `${dh.open.slice(0,5)}–${dh.close.slice(0,5)}`
        : '+ საათები';
      availHtml=`<button class="hours-edit-btn${dh?'':' no-hrs'}" data-hbid="${b.id}">${hrsLabel}</button>
        <button class="off-toggle-btn" data-offbid="${b.id}">⛔ გამოტ.</button>`;
    }
    head+=`<th class="th-barber" colspan="6">${esc(b.name_ka)}<div class="barber-avail">${availHtml}</div></th>`;
  });
  head+='</tr><tr>';
  barbers.forEach(()=>{
    head+='<th class="th-sub">სახელი</th><th class="th-sub">გვარი</th><th class="th-sub">ტელ.</th><th class="th-sub">სერვ.</th><th class="th-sub">ფასი</th><th class="th-sub">გდ.</th>';
  });
  head+='</tr>';
  $('schedHead').innerHTML=head;

  /* ── tbody ── */
  let body='';
  slots.forEach(slotMin=>{
    const time=minToHHMM(slotMin);
    const isHour=slotMin%60===0;
    body+=`<tr class="${isHour?'row-hour':''}">`;
    body+=`<td class="tc td-time">${time}</td>`;

    barbers.forEach(b=>{
      const sd=slotMaps[b.id][slotMin];

      /* continuation rows removed — each slot is independent */

      const bk=sd?.bk;
      const available=isSlotAvailable(b.id,slotMin);

      if(!bk&&!available){
        body+=`<td class="td-unavail" colspan="6"></td>`;
        return;
      }

      const done  =bk?.status==='done';
      const pm    =bk?.payment_method||'';
      const parts =(bk?.customer_name||'').split(' ');
      const fn    =parts[0]||'';
      const ln    =parts.slice(1).join(' ')||'';
      const ph    =bk?.customer_phone||'';
      const bkid  =bk?.id||'';
      const dc    =done?' td-done':'';
      const da    =`data-bid="${b.id}" data-slot="${slotMin}" data-bkid="${esc(bkid)}"`;

      const svIds   =bk?getBookingIds(bk):[];
      const resolved=svIds.length?resolveServices(svIds):null;
      const svidsJson=esc(JSON.stringify(svIds));
      const dispText =resolved?svcLabel(svIds,resolved):'';

      const calcP   =resolved?resolved.price:0;
      const dispP   =bk?(bk.custom_price!=null?Number(bk.custom_price):calcP):null;
      const isCustom=bk&&bk.custom_price!=null;

      body+=`
        <td class="td-in${dc}">
          <input class="ci" type="text" placeholder="სახ." value="${esc(fn)}" ${da} data-f="fn">
        </td>
        <td class="td-in${dc}">
          <input class="ci" type="text" placeholder="გვ." value="${esc(ln)}" ${da} data-f="ln">
        </td>
        <td class="td-in${dc}">
          <input class="ci ci-tel" type="tel" placeholder="ტელ." value="${esc(ph)}" ${da} data-f="ph">
        </td>
        <td class="svc-cell${dc}">
          <button class="svc-disp${svIds.length?'':' empty'}" ${da} data-svids="${svidsJson}">${esc(dispText)||'სერვ.'}</button>
        </td>
        <td class="td-price${dc}">
          <input class="price-inp${isCustom?' price-custom':''}" type="number" min="0" step="1"
            value="${bk?(dispP??''):''}" placeholder="${calcP||''}"
            ${da} data-calc="${calcP}" title="ფასის კორექცია">
        </td>
        <td class="td-pay${dc}${bk?'':' td-pay-empty'}">
          <button class="pbtn${pm==='cash'?' p-on':''}" ${da} data-pm="cash">ქ</button>
          <button class="pbtn${pm==='bog'?' p-on':''}" ${da} data-pm="bog">საქ</button>
          <button class="pbtn${pm==='tbc'?' p-on':''}" ${da} data-pm="tbc">თბს</button>
          ${bk?`<button class="del-btn" data-bkid="${esc(bkid)}" title="წაშლა">✕</button>`:''}
        </td>`;
    });
    body+='</tr>';
  });

  $('schedBody').innerHTML=body;
  attachPriceListeners();
}

function attachPriceListeners(){
  $('schedBody').querySelectorAll('.price-inp').forEach(inp=>{
    inp.addEventListener('change', async()=>{
      const bkid=inp.dataset.bkid;
      if(!bkid) return;
      const val=inp.value;
      const calcP=Number(inp.dataset.calc);
      const custom=(val===''||Number(val)===calcP)?null:Number(val);
      const {error}=await sb.from('bookings').update({custom_price:custom}).eq('id',bkid);
      if(error){ toast('ფასი ვერ შეინახა: '+error.message,'err'); return; }
      inp.classList.toggle('price-custom',custom!==null);
      const bk=bookings.find(x=>x.id===bkid);
      if(bk) bk.custom_price=custom;
      renderFinance();
    });
  });
}

/* ═══════════════════════════════════════════
   SCHEDULE EVENTS (delegation)
═══════════════════════════════════════════ */
/* input autosave trigger */
/* input auto-save (silent) — saves to DB without re-render so data isn't lost on navigation */
$('schedBody').addEventListener('input',e=>{
  const el=e.target;
  if(!el.dataset.bid||!el.classList.contains('ci')) return;
  const key=`${el.dataset.bid}_${el.dataset.slot}`;
  clearTimeout(saveTimers[key]);
  saveTimers[key]=setTimeout(()=>tryAutoSave(el.dataset.bid,el.dataset.slot,true),1500);
});

/* Enter key → save new booking */
$('schedBody').addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  const el=e.target;
  if(!el.dataset.bid||!el.classList.contains('ci')) return;
  e.preventDefault();
  tryAutoSave(el.dataset.bid,el.dataset.slot);
});

/* existing booking field change → auto-update on blur */
$('schedBody').addEventListener('change',e=>{
  const el=e.target;
  if(!el.dataset.bid||!el.dataset.bkid) return;
  const key=`${el.dataset.bid}_${el.dataset.slot}`;
  clearTimeout(saveTimers[key]);
  saveTimers[key]=setTimeout(()=>tryAutoSave(el.dataset.bid,el.dataset.slot),300);
});

/* price inputs — direct handlers attached after each render (see attachPriceListeners) */

/* header clicks: hours-edit-btn + off-toggle-btn */
$('schedHead').addEventListener('click',e=>{
  const hb=e.target.closest('.hours-edit-btn');
  if(hb){ openHoursModal(hb.dataset.hbid); return; }

  const ob=e.target.closest('.off-toggle-btn');
  if(ob){ toggleDayOff(ob.dataset.offbid); }
});

/* body clicks */
$('schedBody').addEventListener('click', async e=>{
  /* service picker */
  const svcBtn=e.target.closest('.svc-disp');
  if(svcBtn){
    if(svcDropTarget){
      if(svcDropTarget.el===svcBtn){ closeSvcDrop(); return; }
      closeSvcDrop();
    }
    const bid=svcBtn.dataset.bid,slot=svcBtn.dataset.slot,bkid=svcBtn.dataset.bkid;
    let selectedIds=[];
    try{ selectedIds=JSON.parse(svcBtn.dataset.svids||'[]'); }catch(err){}
    openSvcDrop(svcBtn,bid,slot,bkid,selectedIds);
    return;
  }
  /* payment buttons */
  const pb=e.target.closest('.pbtn');
  if(pb){
    const bkid=(pb.dataset.bkid||'').trim();
    const pm=pb.dataset.pm;

    if(!bkid){
      /* no booking yet — read row, create booking + set payment in one step */
      const bid=pb.dataset.bid, slot=pb.dataset.slot;
      const sel=`[data-bid="${bid}"][data-slot="${slot}"]`;
      const fn=(document.querySelector(sel+'[data-f="fn"]')?.value||'').trim();
      const ln=(document.querySelector(sel+'[data-f="ln"]')?.value||'').trim();
      const ph=(document.querySelector(sel+'[data-f="ph"]')?.value||'').trim();
      const svcBtn=document.querySelector(sel+'.svc-disp');
      let svIds=[];
      try{ svIds=JSON.parse(svcBtn?.dataset.svids||'[]'); }catch{}
      const priceInp=document.querySelector(sel+'.price-inp');
      const rawPrice=priceInp&&priceInp.value!==''?Number(priceInp.value):null;
      const name=ln?`${fn} ${ln}`:fn;
      if(!name) return;
      const ds=ymd(curDate);
      const resolved=svIds.length?resolveServices(svIds):{price:0,duration:30};
      const dur=resolved.duration||30;
      const m=Number(slot);
      const customPrice=(rawPrice!==null&&rawPrice!==resolved.price)?rawPrice:null;
      const row={barber_id:bid,service_id:svIds[0]||null,service_ids:svIds,customer_name:name,customer_phone:ph||null,
        starts_at:`${ds}T${minToHHMM(m)}:00`,ends_at:`${ds}T${minToHHMM(m+dur)}:00`,
        status:'done',payment_method:pm};
      if(customPrice!==null) row.custom_price=customPrice;
      const {error}=await sb.from('bookings').insert(row);
      if(error){ toast('შეცდომა: '+error.message,'err'); console.error('quick-pay:',error); return; }
      toast('✓ ჩაწერილია');
      await loadDay(); renderSchedule(); renderFinance();
      return;
    }

    /* existing booking */
    const bk=bookings.find(x=>x.id===bkid);
    if(!bk){ console.warn('booking not found:',bkid); return; }
    const newPm=bk.payment_method===pm?null:pm;
    const {error}=await sb.from('bookings')
      .update({payment_method:newPm, status:newPm?'done':'confirmed'})
      .eq('id',bkid);
    if(error){ toast('შეცდომა: '+error.message,'err'); return; }
    toast('✓ გადახდა დაფიქსირდა');
    await loadDay(); renderSchedule(); renderFinance();
    return;
  }
  /* delete */
  const del=e.target.closest('.del-btn');
  if(del){
    if(!confirm('წაიშალოს ჯავშანი?')) return;
    const {error}=await sb.from('bookings').update({status:'cancelled'}).eq('id',del.dataset.bkid);
    if(error){ toast('წაშლა ვერ მოხდა: '+error.message,'err'); return; }
    await loadDay(); renderSchedule(); renderFinance();
  }
});

async function tryAutoSave(barberId,slotMin,silent=false){
  const sel=`[data-bid="${barberId}"][data-slot="${slotMin}"]`;
  const fnEl=document.querySelector(sel+'[data-f="fn"]'); if(!fnEl) return;
  const fn=fnEl.value.trim();
  const ln=(document.querySelector(sel+'[data-f="ln"]')?.value||'').trim();
  const ph=(document.querySelector(sel+'[data-f="ph"]')?.value||'').trim();
  const svcBtn=document.querySelector(sel+'.svc-disp');
  let svIds=[];
  try{ svIds=JSON.parse(svcBtn?.dataset.svids||'[]'); }catch(err){}
  const bkid=(fnEl.dataset.bkid||'').trim();

  if(!fn) return;
  if(!bkid&&!isSlotAvailable(barberId,Number(slotMin))) return;

  const name=ln?`${fn} ${ln}`:fn;
  const ds=ymd(curDate);
  const resolved=svIds.length?resolveServices(svIds):{price:0,duration:30,ids:[]};
  const duration=resolved.duration||30;

  const m=Number(slotMin);
  const startsAt=`${ds}T${minToHHMM(m)}:00`;
  const endsAt  =`${ds}T${minToHHMM(m+duration)}:00`;

  if(bkid){
    const {error:upErr}=await sb.from('bookings').update({
      customer_name:name,customer_phone:ph||null,service_ids:svIds,ends_at:endsAt
    }).eq('id',bkid);
    if(upErr){ toast('განახლება ვერ მოხდა: '+upErr.message,'err'); return; }
    if(!silent) await loadDay(), renderSchedule(), renderFinance();
  } else {
    const {data:ins,error}=await sb.from('bookings').insert({
      barber_id:barberId,service_id:svIds[0]||null,service_ids:svIds,
      customer_name:name,customer_phone:ph||null,
      starts_at:startsAt,ends_at:endsAt,status:'confirmed'
    }).select('id').single();
    if(error){ toast('ჩაწერა ვერ მოხდა: '+error.message,'err'); console.error('autosave:',error); return; }
    toast('✓ ჩაწერილია');
    if(!silent){
      await loadDay(); renderSchedule(); renderFinance();
    } else if(ins?.id){
      /* silent save: patch bkid on DOM without re-render so future edits UPDATE not INSERT */
      const s=`[data-bid="${barberId}"][data-slot="${slotMin}"]`;
      document.querySelectorAll(s).forEach(el=>{ el.dataset.bkid=ins.id; });
    }
  }
}

/* ═══════════════════════════════════════════
   HOURS MODAL
═══════════════════════════════════════════ */
function openHoursModal(barberId){
  hoursModalBarberId=barberId;
  const b=barbers.find(x=>x.id===barberId); if(!b) return;
  const isOff=daysOffSet.has(barberId);
  const dh=dayHoursMap[barberId];
  $('hrsBName').textContent=b.name_ka;
  $('hrsOffNote').classList.toggle('hide',!isOff);
  $('hrsTimeFields').style.opacity=isOff?'.4':'1';
  $('hrsOpen').value =dh?(dh.open.slice(0,5)) :'10:00';
  $('hrsClose').value=dh?(dh.close.slice(0,5)):'20:00';
  $('hrsErr').textContent='';
  $('hoursModal').classList.remove('hide');
}

$('closeHoursModal').addEventListener('click',()=>$('hoursModal').classList.add('hide'));
$('hoursModal').addEventListener('click',e=>{ if(e.target===$('hoursModal')) $('hoursModal').classList.add('hide'); });

$('saveHoursBtn').addEventListener('click',async()=>{
  const open=$('hrsOpen').value, close=$('hrsClose').value;
  if(!open||!close){ $('hrsErr').textContent='ორივე საათი შეიყვანე'; return; }
  if(open>=close){ $('hrsErr').textContent='დაწყება დასრულებაზე ადრე უნდა იყოს'; return; }
  $('saveHoursBtn').disabled=true;
  const ds=ymd(curDate);
  const {error}=await sb.from('barber_day_hours')
    .upsert({barber_id:hoursModalBarberId,work_date:ds,open_time:open+':00',close_time:close+':00'},
            {onConflict:'barber_id,work_date'});
  $('saveHoursBtn').disabled=false;
  if(error){ $('hrsErr').textContent=error.message; return; }
  $('hoursModal').classList.add('hide');
  await loadDay(); renderSchedule();
});

$('clearHoursBtn').addEventListener('click',async()=>{
  await sb.from('barber_day_hours').delete()
    .eq('barber_id',hoursModalBarberId).eq('work_date',ymd(curDate));
  $('hoursModal').classList.add('hide');
  await loadDay(); renderSchedule();
});

$('toggleOffBtn').addEventListener('click',async()=>{
  await toggleDayOff(hoursModalBarberId);
  $('hoursModal').classList.add('hide');
});

async function toggleDayOff(barberId){
  const ds=ymd(curDate);
  if(daysOffSet.has(barberId)){
    await sb.from('barber_days_off').delete().eq('barber_id',barberId).eq('off_date',ds);
  } else {
    await sb.from('barber_days_off').insert({barber_id:barberId,off_date:ds});
  }
  await loadDay(); renderSchedule();
}

/* ═══════════════════════════════════════════
   RENDER FINANCE
═══════════════════════════════════════════ */
function renderFinance(){
  const doneBks=bookings.filter(b=>b.status==='done');

  /* ── Salaries ── */
  let salHtml=`<table class="fin-table">
    <thead><tr><th>ბარბ.</th><th>შეკ.</th><th>შემოს.</th><th>ხელფ.</th></tr></thead><tbody>`;
  let totSal=0,empSal=0,totSess=0,totRev=0;
  barbers.forEach(b=>{
    const bBks=doneBks.filter(x=>x.barber_id===b.id);
    const sess=bBks.length;
    const rev =bBks.reduce((s,bk)=>s+bkPrice(bk),0);
    const pct =b.commission_pct??50;
    const sal =rev*(pct/100);
    totSal+=sal; totSess+=sess; totRev+=rev;
    if(!b.is_founder) empSal+=sal;
    salHtml+=`<tr${b.is_founder?' title="დამფუძნებელი"':''}>
      <td class="nm">${esc(b.name_ka)}${b.is_founder?' <span style="font-size:.65rem;color:var(--muted)">ფუძ.</span>':''}</td>
      <td class="num">${sess}</td>
      <td class="num">${fmt(rev)}</td>
      <td class="num">${fmt(sal)}</td>
    </tr>`;
  });
  salHtml+=`<tr class="tot-row">
    <td>ჯამი</td><td class="num">${totSess}</td>
    <td class="num">${fmt(totRev)}</td>
    <td class="num">${fmt(empSal)}</td>
  </tr></tbody></table>`;
  $('finSalaries').innerHTML=salHtml;

  /* ── Summary ── */
  const totIncome=doneBks.reduce((s,bk)=>s+bkPrice(bk),0);
  const cashInc  =doneBks.filter(b=>b.payment_method==='cash').reduce((s,bk)=>s+bkPrice(bk),0);
  const bogInc   =doneBks.filter(b=>b.payment_method==='bog').reduce((s,bk)=>s+bkPrice(bk), 0);
  const tbcInc   =doneBks.filter(b=>b.payment_method==='tbc').reduce((s,bk)=>s+bkPrice(bk), 0);
  const unpaid   =doneBks.filter(b=>!b.payment_method).reduce((s,bk)=>s+bkPrice(bk),        0);

  const manInc    =finEntries.filter(e=>e.kind==='income'&&e.category!=='ნაშთი');
  const manIncTot =manInc.reduce((s,e)=>s+Number(e.amount),0);
  const expEntries=finEntries.filter(e=>e.kind==='expense');
  const expTot    =expEntries.reduce((s,e)=>s+Number(e.amount),0);

  const totalRev=totIncome+manIncTot;
  const netInc  =totalRev-empSal-expTot;
  const closing =nashtAmount+netInc;

  let sumHtml=`<table class="fin-sum-tbl">
    <tr class="s-head"><td colspan="2">ნაშთი</td></tr>
    <tr class="s-bal"><td>ნაშთი (გახ.)</td><td><input class="fin-edit-bal" id="nashtInput" type="number" value="${nashtAmount}"></td></tr>
    <tr class="s-head"><td colspan="2">შემოსავალი</td></tr>
    <tr class="s-total s-plus"><td>სალონი</td><td>${fmt(totIncome)}</td></tr>`;

  if(manInc.length){
    manInc.forEach(e=>{
      sumHtml+=`<tr class="s-indent"><td>${esc(e.category)}${e.label?` · ${esc(e.label)}`:''}</td><td>${fmt(e.amount)}</td></tr>`;
    });
  }

  sumHtml+=`<tr class="s-total s-plus"><td>შემ. ჯამი</td><td>${fmt(totalRev)}</td></tr>
    <tr class="s-head"><td colspan="2">გადახდა</td></tr>
    <tr><td>ქეში</td><td>${fmt(cashInc)}</td></tr>
    <tr class="s-indent"><td>საქ.</td><td>${fmt(bogInc)}</td></tr>
    <tr class="s-indent"><td>თბს.</td><td>${fmt(tbcInc)}</td></tr>`;

  if(unpaid>0) sumHtml+=`<tr class="s-indent"><td>გადაუხდ.</td><td>${fmt(unpaid)}</td></tr>`;

  sumHtml+=`<tr class="s-head"><td colspan="2">გასვლა</td></tr>
    <tr class="s-minus"><td>ხელფასი</td><td>– ${fmt(empSal)}</td></tr>
    <tr class="s-minus"><td>ხარჯი</td><td>– ${fmt(expTot)}</td></tr>
    <tr class="s-bal"><td>ნაშთი (დახ.)</td><td style="color:#9fe0ff">${fmt(closing)}</td></tr>
  </table>`;
  $('finSummary').innerHTML=sumHtml;

  $('nashtInput').addEventListener('change',async()=>{
    const val=parseFloat($('nashtInput').value)||0;
    const ds=ymd(curDate);
    if(nashtEntryId){
      await sb.from('finance_entries').update({amount:val}).eq('id',nashtEntryId);
    } else {
      const {data}=await sb.from('finance_entries').insert({
        entry_date:ds,kind:'income',category:'ნაშთი',amount:val
      }).select().single();
      nashtEntryId=data?.id||null;
    }
    nashtAmount=val;
    renderFinance();
  });

  /* ── Entries list ── */
  const allEnt=finEntries.filter(e=>!(e.kind==='income'&&e.category==='ნაშთი'));
  let entHtml='';
  allEnt.forEach(e=>{
    const sign=e.kind==='income'?'+':'–';
    const cls =e.kind==='income'?'in':'ex';
    entHtml+=`<div class="entry-row">
      <span class="badge ${cls}">${sign}</span>
      <span class="cat">${esc(e.category)}</span>
      ${e.label?`<span class="lbl">${esc(e.label)}</span>`:''}
      <span class="amt">${fmt(e.amount)}</span>
      <button class="eb del" data-eid="${e.id}">✕</button>
    </div>`;
  });
  $('finEntries').innerHTML=entHtml||'<div class="fin-empty">ჩანაწერები არ არის</div>';
}

$('finEntries').addEventListener('click',async e=>{
  const d=e.target.closest('.eb.del'); if(!d) return;
  await sb.from('finance_entries').delete().eq('id',d.dataset.eid);
  await loadDay(); renderFinance();
});

$('addEntryBtn').addEventListener('click',()=>{

$('saveEntry').addEventListener('click',async()=>{

/* ═══════════════════════════════════════════
   BARBER MANAGEMENT
═══════════════════════════════════════════ */
let allBarbers=[];

async function loadAllBarbers(){
  const {data}=await sb.from('barbers').select('id,name_ka,commission_pct,sort,active,is_founder').order('sort');
  allBarbers=data||[];
  renderBarberMgmt();
}

function renderBarberMgmt(){
  if(!$('barbMgmtList')) return;
  let html=`<table class="barb-tbl">
    <thead><tr><th>სახელი</th><th>რ.</th><th>სტ.</th><th>ფუძ.</th><th></th></tr></thead><tbody>`;
  allBarbers.forEach(b=>{
    html+=`<tr>
      <td><input class="b-inp b-name" data-bid="${b.id}" value="${esc(b.name_ka)}"></td>
      <td><input class="b-inp b-sort" data-bid="${b.id}" type="number" value="${b.sort??0}" style="width:44px"></td>
      <td><button class="barb-active-tog ${b.active?'is-active':''}" data-bid="${b.id}">${b.active?'აქტ.':'გათ.'}</button></td>
      <td><button class="barb-active-tog ${b.is_founder?'is-active':''} b-founder" data-bid="${b.id}">${b.is_founder?'კი':'არა'}</button></td>
      <td><button class="barb-del" data-bid="${b.id}">✕</button></td>
    </tr>`;
  });
  html+='</tbody></table>';
  $('barbMgmtList').innerHTML=html;

  $('barbMgmtList').querySelectorAll('.b-name').forEach(inp=>{
    inp.addEventListener('change',async()=>{
      const val=inp.value.trim(); if(!val) return;
      await sb.from('barbers').update({name_ka:val}).eq('id',inp.dataset.bid);
      await loadMeta(); renderAll(); await loadAllBarbers();
    });
  });
  $('barbMgmtList').querySelectorAll('.b-sort').forEach(inp=>{
    inp.addEventListener('change',async()=>{
      await sb.from('barbers').update({sort:Number(inp.value)}).eq('id',inp.dataset.bid);
      await loadMeta(); renderAll(); await loadAllBarbers();
    });
  });
  $('barbMgmtList').querySelectorAll('.barb-active-tog:not(.b-founder)').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const b=allBarbers.find(x=>x.id===btn.dataset.bid); if(!b) return;
      await sb.from('barbers').update({active:!b.active}).eq('id',btn.dataset.bid);
      await loadMeta(); renderAll(); await loadAllBarbers();
    });
  });
  $('barbMgmtList').querySelectorAll('.b-founder').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const b=allBarbers.find(x=>x.id===btn.dataset.bid); if(!b) return;
      await sb.from('barbers').update({is_founder:!b.is_founder}).eq('id',btn.dataset.bid);
      await loadMeta(); renderFinance(); await loadAllBarbers();
    });
  });
  $('barbMgmtList').querySelectorAll('.barb-del').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      if(!confirm('ბარბერი სამუდამოდ წაიშალოს?')) return;
      const {error}=await sb.from('barbers').delete().eq('id',btn.dataset.bid);
      if(error){ toast('წაშლა ვერ მოხდა: '+error.message,'err'); return; }
      await loadMeta(); renderAll(); await loadAllBarbers();
    });
  });
}

$('addBarbBtn').addEventListener('click',()=>{
  $('bName').value=''; $('bPct').value='50'; $('bErr').textContent=''; $('bPhoto').value='';
  const nextSort=allBarbers.length?Math.max(...allBarbers.map(b=>b.sort||0))+1:1;
  $('bSort').value=nextSort;
  $('barbModal').classList.remove('hide');
});
$('closeBarbModal').addEventListener('click',()=>$('barbModal').classList.add('hide'));
$('barbModal').addEventListener('click',e=>{ if(e.target===$('barbModal')) $('barbModal').classList.add('hide'); });

$('saveBarbBtn').addEventListener('click',async()=>{
  const name=$('bName').value.trim();
  const pct =Number($('bPct').value);
  const sort=Number($('bSort').value);
  if(!name){ $('bErr').textContent='შეიყვანეთ სახელი'; return; }
  $('saveBarbBtn').disabled=true; $('bErr').textContent='';

  let photoUrl=null;
  const file=$('bPhoto').files[0];
  if(file){
    const ext=file.name.split('.').pop().toLowerCase();
    const path=`${Date.now()}.${ext}`;
    const {error:upErr}=await sb.storage.from('barber-photos').upload(path,file,{upsert:true});
    if(upErr){ $('bErr').textContent='ფოტოს ატვირთვა ვერ მოხდა: '+upErr.message; $('saveBarbBtn').disabled=false; return; }
    const {data:{publicUrl}}=sb.storage.from('barber-photos').getPublicUrl(path);
    photoUrl=publicUrl;
  }

  const {error}=await sb.from('barbers').insert({name_ka:name,name_en:name,commission_pct:pct,sort,active:true,photo_url:photoUrl});
  $('saveBarbBtn').disabled=false;
  if(error){ $('bErr').textContent='შეცდომა: '+error.message; return; }
  $('barbModal').classList.add('hide');
  await loadMeta(); renderAll(); await loadAllBarbers();
});
