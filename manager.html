<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ადმინისტრატორი · Gentleman Barbershop</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/jpeg" href="barbershop-logo.jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@300;400;500;600&family=Noto+Sans+Georgian:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0c0c0c;--bg-2:#131313;--card:#1a1a1a;--card-2:#202020;
  --text:#f3f1ee;--muted:#9a9893;--muted-2:#6b6a66;
  --line:rgba(255,255,255,.10);--line-2:rgba(255,255,255,.18);
  --accent:#6366f1;--ok:#3fb950;
  --ppm:2.2; /* px per minute */
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Georgian','Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
h1,h2,h3,.ttl{font-family:'Noto Sans Georgian','Archivo',sans-serif;font-weight:800;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}

/* ---- login ---- */
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:50;padding:20px}
.login-card{width:100%;max-width:360px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:32px}
.login-card img{width:54px;height:54px;border-radius:12px;object-fit:cover;margin-bottom:18px}
.login-card h1{font-size:1.4rem;margin-bottom:4px}
.login-card p{color:var(--muted);font-size:.85rem;font-weight:300;margin-bottom:22px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:.74rem;letter-spacing:.04em;color:var(--muted);margin-bottom:6px}
.fld input,.fld select{width:100%;padding:12px 14px;background:var(--card-2);border:1px solid var(--line-2);border-radius:11px;color:var(--text);font-size:.95rem}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--text)}
.btn{width:100%;padding:13px;border-radius:11px;background:var(--text);color:var(--bg);font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.92rem;letter-spacing:.02em;transition:.2s}
.btn:hover{opacity:.9}
.login-err{color:#e5484d;font-size:.82rem;margin-top:12px;min-height:18px}

/* ---- topbar ---- */
.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:14px 20px;background:rgba(12,12,12,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:10px;font-family:'Noto Sans Georgian','Archivo';font-weight:800;font-size:.95rem;letter-spacing:.02em}
.brand img{width:30px;height:30px;border-radius:8px;object-fit:cover}
.brand .tag{font-size:.66rem;font-weight:700;color:#c8caf6;background:rgba(99,102,241,.16);border:1px solid rgba(99,102,241,.4);
  padding:2px 8px;border-radius:6px;letter-spacing:.02em}
.spacer{flex:1}
.datenav{display:flex;align-items:center;gap:8px}
.datenav button{width:34px;height:34px;border-radius:9px;border:1px solid var(--line-2);font-size:1.1rem;color:var(--muted);transition:.2s}
.datenav button:hover{border-color:var(--text);color:var(--text)}
.datenav .today-btn{width:auto;padding:0 14px;font-family:'Noto Sans Georgian','Archivo';font-weight:600;font-size:.8rem}
.curdate{font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:1rem;min-width:230px;text-align:center}
.ctl{padding:8px 12px;background:var(--card-2);border:1px solid var(--line-2);border-radius:9px;color:var(--text);font-size:.85rem}
.add-btn{padding:9px 15px;border:1px solid var(--accent);background:rgba(99,102,241,.16);border-radius:9px;
  font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.82rem;color:#c8caf6;transition:.2s}
.add-btn:hover{background:rgba(99,102,241,.32)}
.logout{padding:8px 14px;border:1px solid var(--line-2);border-radius:9px;font-family:'Noto Sans Georgian','Archivo';font-weight:600;font-size:.8rem;color:var(--muted);transition:.2s}
.logout:hover{border-color:#e5484d;color:#e5484d}

/* ---- calendar grid ---- */
.cal-wrap{padding:18px 20px 60px;overflow-x:auto}
.cal{display:grid;gap:0;min-width:680px}
.col-head{position:sticky;top:0;padding:12px 8px;text-align:center;font-family:'Noto Sans Georgian','Archivo';font-weight:700;
  font-size:.88rem;letter-spacing:.02em;border-bottom:1px solid var(--line-2);border-left:1px solid var(--line)}
.col-head.time-head{border-left:none;position:sticky;left:0;z-index:6;background:var(--bg)}
.col-head .cnt{display:block;font-family:'Noto Sans Georgian','Inter';font-weight:400;font-size:.68rem;color:var(--muted-2);margin-top:2px}
.col-body{position:relative;border-left:1px solid var(--line);cursor:copy}
.col-body.time-axis{border-left:none;cursor:default;position:sticky;left:0;z-index:3;background:var(--bg)}
.hourline{position:absolute;left:0;right:0;border-top:1px dashed var(--line);pointer-events:none}
.hourlabel{position:absolute;right:8px;transform:translateY(-50%);font-size:.72rem;color:var(--muted-2);font-family:'Archivo';font-weight:600}
.bk{position:absolute;left:4px;right:4px;border-radius:9px;padding:5px 8px;overflow:hidden;
  background:linear-gradient(135deg,rgba(99,102,241,.30),rgba(99,102,241,.16));
  border:1px solid rgba(99,102,241,.55);cursor:pointer;display:flex;flex-direction:column;gap:1px;transition:.12s}
.bk:hover{filter:brightness(1.12);border-color:rgba(99,102,241,.9)}
.bk:active{transform:scale(.985)}
.bk b{font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.84rem;line-height:1.2;color:var(--text);word-break:break-word}
.bk .svc{font-size:.76rem;color:#c8caf6;line-height:1.2;font-weight:500;word-break:break-word}
.bk .tm{font-size:.7rem;color:var(--muted);line-height:1.25}
.bk a{color:inherit;text-decoration:none}
.bk .tap{position:absolute;top:4px;right:6px;font-size:.8rem;color:var(--muted);opacity:.55}
.bk.is-done{background:linear-gradient(135deg,rgba(63,185,80,.26),rgba(63,185,80,.12));border-color:rgba(63,185,80,.5)}
.bk.is-done b,.bk.is-done .svc{text-decoration:line-through;opacity:.75}
.bk.is-done .svc{color:#9fe0a8}
.bk .doneflag{position:absolute;bottom:3px;right:7px;font-size:.66rem;color:var(--ok);font-weight:700;display:none}
.bk.is-done .doneflag{display:block}
.empty-note{padding:40px;text-align:center;color:var(--muted-2);font-size:.9rem}
.avail-btn{display:block;margin:6px auto 0;font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.66rem;
  padding:4px 9px;border-radius:7px;border:1px solid rgba(63,185,80,.4);background:rgba(63,185,80,.12);color:#9fe0a8;transition:.18s}
.avail-btn:hover{filter:brightness(1.15)}
.avail-btn.off{border-color:rgba(229,72,77,.45);background:rgba(229,72,77,.14);color:#e5747a}
.col-head.head-off{opacity:.75}
.col-body.col-off{background:repeating-linear-gradient(45deg,rgba(229,72,77,.05),rgba(229,72,77,.05) 10px,transparent 10px,transparent 20px)}
.col-off-note{position:absolute;top:8px;left:0;right:0;text-align:center;font-family:'Noto Sans Georgian','Archivo';
  font-weight:700;font-size:.72rem;color:#e5747a;pointer-events:none;z-index:1}
/* drag-to-resize handle on a booking (Google-Calendar style) */
.bk-resize{position:absolute;left:0;right:0;bottom:0;height:11px;cursor:ns-resize;
  display:flex;align-items:flex-end;justify-content:center;touch-action:none;z-index:2}
.bk-resize::after{content:"";width:26px;height:3px;margin-bottom:2px;border-radius:2px;
  background:rgba(255,255,255,.45);transition:.15s}
.bk:hover .bk-resize::after{background:rgba(255,255,255,.75)}
.bk.resizing{opacity:.92;z-index:6;border-color:rgba(99,102,241,.95)}
.bk.resizing .bk-resize::after{background:#fff}
/* drag-to-move a booking (up/down = time, across columns = barber) */
.bk{touch-action:none}
.bk.dragging{opacity:.85;z-index:7;cursor:grabbing;box-shadow:0 10px 26px rgba(0,0,0,.55);border-color:rgba(99,102,241,.95)}
.col-body.drop-target{background:rgba(99,102,241,.07)}
/* per-day working-hours control in the column header */
.hours-btn{display:block;margin:5px auto 0;font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.66rem;
  padding:4px 9px;border-radius:7px;border:1px solid var(--line-2);background:var(--card-2);color:var(--muted);transition:.18s}
.hours-btn:hover{border-color:var(--text);color:var(--text)}
.hours-btn.set{border-color:rgba(99,102,241,.6);background:rgba(99,102,241,.14);color:#c8caf6}

/* ---- modal ---- */
.modal{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.62);padding:20px}
.modal-card{width:100%;max-width:440px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;max-height:92vh;overflow:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-head h2{font-size:1.2rem}
.modal .x{font-size:1.7rem;line-height:1;color:var(--muted);width:32px;height:32px;border-radius:8px}
.modal .x:hover{color:var(--text)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal .btn{margin-top:6px}
.hide{display:none!important}

/* ---- view toggle ---- */
.viewtabs{display:flex;gap:4px;background:var(--card-2);border:1px solid var(--line-2);border-radius:10px;padding:3px}
.viewtabs button{padding:7px 14px;border-radius:8px;font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.82rem;color:var(--muted);transition:.18s}
.viewtabs button.on{background:var(--text);color:var(--bg)}

/* ---- finances ---- */
.fin-wrap{padding:18px 20px 60px;max-width:1180px;margin:0 auto}
.fin-period{display:inline-flex;gap:4px;background:var(--card-2);border:1px solid var(--line-2);border-radius:9px;padding:3px;margin-bottom:18px}
.fin-period button{padding:6px 16px;border-radius:7px;font-family:'Noto Sans Georgian','Archivo';font-weight:600;font-size:.8rem;color:var(--muted);transition:.18s}
.fin-period button.on{background:var(--accent);color:#fff}
.fin-readonly{display:inline-flex;align-items:center;gap:6px;margin-left:12px;font-size:.74rem;color:var(--muted-2);
  border:1px solid var(--line);border-radius:7px;padding:5px 10px}
.fin-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;align-items:start}
@media(max-width:860px){.fin-grid{grid-template-columns:1fr}}
.fin-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px}
.fin-card h3{font-size:1.02rem;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.fin-card h3 .small{font-family:'Noto Sans Georgian','Inter';font-weight:400;font-size:.74rem;color:var(--muted-2)}
.fin-table{width:100%;border-collapse:collapse;font-size:.86rem}
.fin-table th{text-align:right;font-family:'Noto Sans Georgian','Inter';font-weight:500;font-size:.7rem;letter-spacing:.03em;color:var(--muted-2);
  text-transform:uppercase;padding:0 8px 8px;border-bottom:1px solid var(--line)}
.fin-table th:first-child,.fin-table td:first-child{text-align:left}
.fin-table td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
.fin-table td.num{text-align:right;font-family:'Archivo';font-weight:700;font-variant-numeric:tabular-nums}
.fin-table tr:last-child td{border-bottom:none}
.fin-table .nm{font-weight:600}
.fin-table .sub{font-size:.72rem;color:var(--muted-2);font-weight:400}
.fin-sum{margin-top:4px}
.fin-sum .row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 2px;border-bottom:1px solid var(--line)}
.fin-sum .row:last-child{border-bottom:none}
.fin-sum .row .k{font-size:.88rem;color:var(--muted)}
.fin-sum .row .v{font-family:'Archivo';font-weight:800;font-size:.98rem;font-variant-numeric:tabular-nums}
.fin-sum .row.total{margin-top:6px;padding-top:14px;border-top:2px solid var(--line-2)}
.fin-sum .row.total .k{color:var(--text);font-weight:700;font-family:'Noto Sans Georgian','Archivo'}
.fin-sum .row.total .v{font-size:1.3rem}
.fin-sum .v.plus{color:var(--ok)}
.fin-sum .v.minus{color:#e5747a}
.fin-sum .v.net{color:#9fe0ff}
.entry-row{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:.85rem}
.entry-row:last-child{border-bottom:none}
.entry-row .badge{font-size:.66rem;font-weight:700;padding:2px 7px;border-radius:6px;font-family:'Archivo';white-space:nowrap}
.entry-row .badge.in{background:rgba(63,185,80,.16);color:#9fe0a8}
.entry-row .badge.ex{background:rgba(229,72,77,.16);color:#e5747a}
.entry-row .cat{font-weight:600}
.entry-row .lbl{color:var(--muted-2);font-size:.76rem}
.entry-row .amt{margin-left:auto;font-family:'Archivo';font-weight:700;font-variant-numeric:tabular-nums}
.entry-row .eb{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.9rem;
  border:1px solid var(--line-2);color:var(--muted);transition:.15s}
.entry-row .eb:hover{border-color:var(--text);color:var(--text)}
.entry-row .eb.del:hover{border-color:#e5484d;color:#e5484d}
.fin-empty{padding:22px 4px;text-align:center;color:var(--muted-2);font-size:.84rem}
.seg{display:flex;gap:6px}
.seg button{flex:1;padding:11px;border-radius:10px;border:1px solid var(--line-2);font-family:'Noto Sans Georgian','Archivo';
  font-weight:700;font-size:.86rem;color:var(--muted);transition:.18s}
.seg button.on{border-color:var(--text);color:var(--text);background:var(--card-2)}

/* ---- booking action sheet ---- */
.bk-info{position:relative;background:var(--card-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.bk-info .svc-l{font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:1rem;margin-bottom:6px;padding-right:72px}
.bk-info .svc-price{position:absolute;top:13px;right:14px;font-family:'Archivo';font-weight:800;font-size:1rem;
  color:#9fe0ff;background:rgba(99,102,241,.14);border:1px solid rgba(99,102,241,.35);border-radius:8px;padding:3px 9px;white-space:nowrap}
.bk-info .meta{font-size:.88rem;color:var(--muted);line-height:1.7}
.bk-info .meta a{color:#c8caf6;text-decoration:none}
.bk-info .done-tag{display:inline-block;margin-top:8px;font-size:.78rem;font-weight:700;color:var(--ok);
  background:rgba(63,185,80,.14);padding:3px 10px;border-radius:7px}
.btn-act{width:100%;padding:15px;border-radius:12px;font-family:'Noto Sans Georgian','Archivo';font-weight:800;
  font-size:1rem;letter-spacing:.01em;border:1px solid var(--line-2);color:var(--text);background:var(--card-2);transition:.15s;
  display:flex;align-items:center;justify-content:center;gap:8px}
.btn-act:hover{filter:brightness(1.15)}
.btn-act:active{transform:scale(.98)}
.btn-act.done{background:rgba(63,185,80,.18);border-color:rgba(63,185,80,.5);color:#9fe0a8}
.btn-act.undo{background:rgba(99,102,241,.16);border-color:rgba(99,102,241,.5);color:#c8caf6}
.btn-act.cancel{background:rgba(229,72,77,.14);border-color:rgba(229,72,77,.45);color:#e5747a}
.btn-act.ghost{background:transparent;border-color:var(--line);color:var(--muted);font-weight:700;font-size:.88rem;padding:11px}
.btn-act.ghost:hover{color:var(--text);border-color:var(--line-2)}
.pay-q{font-family:'Noto Sans Georgian','Archivo';font-weight:700;font-size:.92rem;color:var(--muted);
  text-align:center;margin:2px 0 4px;animation:payIn .22s cubic-bezier(.22,.61,.36,1)}
#bkActions .btn-act{animation:payIn .22s cubic-bezier(.22,.61,.36,1) backwards}
#bkActions .btn-act:nth-child(2){animation-delay:.04s}
#bkActions .btn-act:nth-child(3){animation-delay:.08s}
@keyframes payIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.pay-bog{color:#ffb27a!important;border-color:rgba(232,119,46,.5)!important;background:rgba(232,119,46,.12)!important}
.pay-tbc{color:#79e3df!important;border-color:rgba(30,181,176,.5)!important;background:rgba(30,181,176,.12)!important}
.pay-cash{color:#9fe0a8!important;border-color:rgba(63,185,80,.5)!important;background:rgba(63,185,80,.12)!important}

/* ---- income by channel ---- */
.chan{margin-bottom:13px}
.chan-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:5px}
.chan-k{font-size:.86rem;color:var(--muted)}
.chan-v{font-family:'Archivo';font-weight:800;font-size:.96rem;font-variant-numeric:tabular-nums}
.chan-bar{height:8px;border-radius:6px;background:var(--card-2);overflow:hidden}
.chan-bar i{display:block;height:100%;width:0;border-radius:6px;transition:width .55s cubic-bezier(.22,.61,.36,1)}
.chan-pct{font-size:.7rem;color:var(--muted-2);text-align:right;margin-top:3px;font-variant-numeric:tabular-nums}
.chan-total{display:flex;justify-content:space-between;align-items:baseline;padding-top:12px;margin-top:8px;
  border-top:2px solid var(--line-2);font-family:'Noto Sans Georgian','Archivo';font-weight:700}
.chan-total .ct-v{font-family:'Archivo';font-weight:800;font-size:1.1rem;font-variant-numeric:tabular-nums}

/* ════════════ MOBILE ════════════ */
@media(max-width:720px){
  .top{flex-wrap:wrap;gap:10px;padding:10px 12px}
  .top .spacer{display:none}
  .brand{order:0;flex:1 1 auto;font-size:.9rem}
  .logout{order:1}
  .viewtabs{order:2;flex:1 1 100%;justify-content:center}
  .viewtabs button{flex:1;text-align:center}
  .datenav{order:3}
  .datenav button{width:40px;height:40px}
  .datenav .today-btn{width:auto}
  .curdate{order:4;flex:1 1 auto;min-width:0;text-align:center;font-size:.92rem}
  .add-btn{order:5;flex:1 1 46%;text-align:center;padding:12px}
  #barberFilter{order:6;flex:1 1 46%}
  .fin-readonly{margin:0 0 14px}
  .cal-wrap{padding:14px 10px 60px;-webkit-overflow-scrolling:touch}
  .fin-wrap{padding:14px 12px 60px}
  .modal{padding:12px;align-items:flex-end}
  .modal-card{max-height:94vh;border-radius:18px 18px 0 0}
  .row2{grid-template-columns:1fr 1fr}
}
@media(max-width:420px){
  .brand .tag{display:none}
  .row2{grid-template-columns:1fr}
  .curdate{font-size:.84rem}
  .fin-table{font-size:.8rem}
  .fin-table th,.fin-table td{padding:7px 5px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-card">
    <img src="barbershop-logo.jpg" alt="logo" />
    <h1>ადმინისტრატორი</h1>
    <p>Gentleman Barbershop · ჯავშნების მართვა</p>
    <form id="loginForm">
      <div class="fld"><label>ელ. ფოსტა</label><input type="email" id="email" autocomplete="username" required /></div>
      <div class="fld"><label>პაროლი</label><input type="password" id="password" autocomplete="current-password" required /></div>
      <button class="btn" type="submit" id="loginBtn">შესვლა</button>
      <div class="login-err" id="loginErr"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" class="hide">
  <div class="top">
    <div class="brand"><img src="barbershop-logo.jpg" alt="" /> Gentleman <span class="tag">ადმინისტრატორი</span></div>
    <div class="viewtabs">
      <button id="tabCal" class="on" data-view="cal">📅 ჯავშნები</button>
      <button id="tabFin" data-view="fin">₾ ფინანსები</button>
    </div>
    <div class="spacer"></div>
    <div class="datenav">
      <button id="prevDay" aria-label="წინა">&#8249;</button>
      <button class="today-btn" id="todayBtn">დღეს</button>
      <button id="nextDay" aria-label="შემდეგი">&#8250;</button>
    </div>
    <div class="curdate" id="curDate"></div>
    <div class="spacer"></div>
    <button class="add-btn" id="addBtn">+ ჯავშანი</button>
    <select class="ctl" id="barberFilter"><option value="">ყველა ბარბერი</option></select>
    <button class="logout" id="logoutBtn">გასვლა</button>
  </div>
  <div class="cal-wrap" id="calWrap"><div class="cal" id="cal"></div></div>

  <!-- FINANCES (read-only) -->
  <div class="fin-wrap hide" id="finWrap">
    <div class="fin-period">
      <button id="perDay" class="on" data-per="day">დღე</button>
      <button id="perMonth" data-per="month">თვე</button>
    </div>
    <div class="fin-grid" style="margin-top:4px">
      <div class="fin-card">
        <h3>ბარბერების ხელფასები <span class="small" id="finSalHint"></span></h3>
        <table class="fin-table" id="finSalaries"></table>
      </div>
      <div>
        <div class="fin-card" style="margin-bottom:16px">
          <h3>ხელით ჩანაწერები <button class="add-btn" id="addEntryBtn">+ დამატება</button></h3>
          <div class="fin-sum" id="finEntriesSum"></div>
          <div id="finEntries" style="margin-top:10px"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- BOOKING ACTION SHEET -->
<div class="modal hide" id="bkModal">
  <div class="modal-card" style="max-width:380px">
    <div class="modal-head"><h2 id="bkTitle">ჯავშანი</h2><button class="x" id="bkClose" aria-label="დახურვა">&times;</button></div>
    <div class="bk-info" id="bkInfo"></div>
    <div id="bkActions" style="display:flex;flex-direction:column;gap:10px"></div>
  </div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  const cfg = window.SUPABASE_CONFIG;
  const sb = window.supabase.createClient(cfg.url, cfg.anonKey);
  const $ = id => document.getElementById(id);
  const pad = n => String(n).padStart(2,'0');
  const ymd = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const hhmmM = m => pad(Math.floor(m/60))+':'+pad(m%60);

  const OPEN=11, CLOSE=20;                 // shop hours
  const PPM=2.2;                            // px per minute (matches --ppm)
  const dayHeight=(CLOSE-OPEN)*60*PPM;
  let barbers=[], services=[], curDate=new Date(); curDate.setHours(0,0,0,0);
  let view='cal', finPeriod='day', dayBookings=[], dayHoursMap={}, editId=null, eKind='income';
  const INCOME_CATS=['პროდუქცია','ყავა','დაბანა','სასმელი','სალონი','სხვა შემოსავალი'];
  const EXPENSE_CATS=['ხარჯი','ხელფასის გატანა','ქირა','კომუნალური','სხვა ხარჯი'];
  const PAY_LABEL={cash:'ქეში',bog:'საქართველოს ბანკი',tbc:'თიბისი ბანკი'};
  const money = n => (Math.round((+n||0)*100)/100).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:2})+' ₾';
  const monthName = d => d.toLocaleDateString('ka-GE',{month:'long',year:'numeric'});

  /* ---------- auth ---------- */
  $('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const btn=$('loginBtn'); btn.disabled=true; btn.textContent='შესვლა…'; $('loginErr').textContent='';
    const {error}=await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});
    btn.disabled=false; btn.textContent='შესვლა';
    if(error){ $('loginErr').textContent='ვერ შევედით — შეამოწმე ელ.ფოსტა და პაროლი'; return; }
    boot();
  });
  $('logoutBtn').addEventListener('click', async ()=>{ await sb.auth.signOut(); location.reload(); });

  /* ---------- date nav ---------- */
  const byMonth = () => view==='fin' && finPeriod==='month';
  function step(dir){
    if(byMonth()) curDate.setMonth(curDate.getMonth()+dir);
    else curDate.setDate(curDate.getDate()+dir);
    renderActive();
  }
  $('prevDay').addEventListener('click',()=>step(-1));
  $('nextDay').addEventListener('click',()=>step(1));
  $('todayBtn').addEventListener('click',()=>{ curDate=new Date(); curDate.setHours(0,0,0,0); renderActive(); });
  $('barberFilter').addEventListener('change', render);
  $('addBtn').addEventListener('click',()=>openModal());

  /* ---------- view + period toggles ---------- */
  function setView(v){
    view=v;
    $('tabCal').classList.toggle('on',v==='cal');
    $('tabFin').classList.toggle('on',v==='fin');
    $('calWrap').classList.toggle('hide',v!=='cal');
    $('finWrap').classList.toggle('hide',v!=='fin');
    $('addBtn').classList.toggle('hide',v!=='cal');
    $('barberFilter').classList.toggle('hide',v!=='cal');
    renderActive();
  }
  $('tabCal').addEventListener('click',()=>setView('cal'));
  $('tabFin').addEventListener('click',()=>setView('fin'));
  $('perDay').addEventListener('click',()=>{ finPeriod='day'; $('perDay').classList.add('on'); $('perMonth').classList.remove('on'); renderFinance(); });
  $('perMonth').addEventListener('click',()=>{ finPeriod='month'; $('perMonth').classList.add('on'); $('perDay').classList.remove('on'); renderFinance(); });
  function renderActive(){ if(view==='fin') renderFinance(); else render(); }

  /* ---------- data + render ---------- */
  async function boot(){
    $('login').classList.add('hide');
    $('app').classList.remove('hide');
    const [{data:bd},{data:sd}]=await Promise.all([
      sb.from('barbers').select('*').order('sort'),
      sb.from('services').select('*').order('sort')
    ]);
    barbers=bd||[]; services=sd||[];
    $('barberFilter').innerHTML='<option value="">ყველა ბარბერი</option>'+
      barbers.map(b=>`<option value="${b.id}">${b.name_ka}</option>`).join('');
    $('mBarber').innerHTML=barbers.map(b=>`<option value="${b.id}">${b.name_ka}</option>`).join('');
    $('mService').innerHTML=services.map(s=>`<option value="${s.id}">${s.name_ka} · ${s.price}₾ · ${s.duration_min}წთ</option>`).join('');
    render();
    subscribeRealtime();
    startAutoRefresh();
  }

  /* ---------- live sync across panels (founder ↔ manager) ---------- */
  let rtChannel=null;
  function subscribeRealtime(){
    if(rtChannel) return;
    rtChannel=sb.channel('rt-bookings')
      .on('postgres_changes',{event:'*',schema:'public',table:'bookings'},()=>renderActive())
      .subscribe();
  }

  /* ---------- auto-refresh fallback (new bookings appear without F5) ---------- */
  let refreshTimer=null;
  function anyModalOpen(){
    return ['modal','bkModal','eModal','hrsModal'].some(id=>{ const el=$(id); return el && !el.classList.contains('hide'); });
  }
  function startAutoRefresh(){
    if(refreshTimer) return;
    refreshTimer=setInterval(()=>{
      if(document.hidden || anyModalOpen()) return;
      renderActive();
    }, 15000);
  }

  function fmtDate(d){ return d.toLocaleDateString('ka-GE',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
  const minOf = iso => { const [h,m]=iso.split('T')[1].split(':'); return (+h)*60+(+m); };
  const hhmm = iso => iso.split('T')[1].slice(0,5);

  async function render(){
    $('curDate').textContent=fmtDate(curDate);
    const dayStr=ymd(curDate);
    const next=new Date(curDate); next.setDate(next.getDate()+1);
    const [{data:bookings,error},{data:offs},{data:dhrs}]=await Promise.all([
      sb.from('bookings')
        .select('id,customer_name,customer_phone,starts_at,ends_at,barber_id,status,payment_method,services(name_en,name_ka,price)')
        .gte('starts_at',dayStr+'T00:00:00').lt('starts_at',ymd(next)+'T00:00:00')
        .neq('status','cancelled').order('starts_at'),
      sb.from('barber_days_off').select('barber_id').eq('off_date',dayStr),
      sb.from('barber_day_hours').select('barber_id,open_time,close_time').eq('work_date',dayStr)
    ]);
    if(error){ $('cal').innerHTML=`<p class="empty-note">${error.message}</p>`; return; }
    dayBookings=bookings||[];
    const offSet=new Set((offs||[]).map(o=>o.barber_id));
    dayHoursMap={}; (dhrs||[]).forEach(r=>{ dayHoursMap[r.barber_id]={open:r.open_time,close:r.close_time}; });

    const filter=$('barberFilter').value;
    const cols = filter ? barbers.filter(b=>b.id===filter) : barbers;
    const byBarber={}; cols.forEach(b=>byBarber[b.id]=[]);
    (bookings||[]).forEach(bk=>{ if(byBarber[bk.barber_id]) byBarber[bk.barber_id].push(bk); });

    const grid=$('cal');
    grid.style.gridTemplateColumns=`56px repeat(${cols.length},minmax(120px,1fr))`;

    let lines='';
    for(let h=OPEN;h<=CLOSE;h++){ lines+=`<div class="hourline" style="top:${(h-OPEN)*60*PPM}px"></div>`; }
    let timeLabels='';
    for(let h=OPEN;h<=CLOSE;h++){ timeLabels+=`<div class="hourlabel" style="top:${(h-OPEN)*60*PPM}px">${pad(h)}:00</div>`; }

    let html =
      `<div class="col-head time-head"></div>` +
      cols.map(b=>{ const off=offSet.has(b.id); const dh=dayHoursMap[b.id];
        return `<div class="col-head${off?' head-off':''}">${b.name_ka}<span class="cnt">${byBarber[b.id].length} ჯავშანი</span>
          <button class="avail-btn${off?' off':''}" data-avail="${b.id}">${off?'⛔ დღეს არ მუშაობს':'✓ ხელმისაწვდომია'}</button>
          ${off?'':`<button class="hours-btn${dh?' set':''}" data-hours="${b.id}">🕐 ${dh?dh.open.slice(0,5)+'–'+dh.close.slice(0,5):'საათები'}</button>`}</div>`;
      }).join('') +
      `<div class="col-body time-axis" style="height:${dayHeight}px">${timeLabels}</div>` +
      cols.map(b=>{ const off=offSet.has(b.id);
        const blocks=byBarber[b.id].map(bk=>{
          const top=(minOf(bk.starts_at)-OPEN*60)*PPM;
          const hgt=Math.max((minOf(bk.ends_at)-minOf(bk.starts_at))*PPM-3,30);
          const done=bk.status==='done';
          return `<div class="bk${done?' is-done':''}" data-id="${bk.id}" style="top:${top}px;height:${hgt}px">
            <span class="tap">&#8943;</span>
            <b>${esc(bk.customer_name)}</b>
            <span class="svc">${bk.services?esc(bk.services.name_ka):''}</span>
            <span class="tm">${hhmm(bk.starts_at)}–${hhmm(bk.ends_at)} · ${esc(bk.customer_phone)}</span>
            <span class="doneflag">&#10003; შესრულდა</span>
            ${done?'':`<div class="bk-resize" data-rz="${bk.id}"></div>`}
          </div>`;
        }).join('');
        return `<div class="col-body${off?' col-off':''}" data-barber="${b.id}" style="height:${dayHeight}px">${lines}${blocks}${off?`<div class="col-off-note">⛔ ამ დღეს არ მუშაობს</div>`:''}</div>`;
      }).join('');

    grid.innerHTML=html;
  }

  async function toggleAvail(barberId){
    const dayStr=ymd(curDate);
    const {data:existing}=await sb.from('barber_days_off').select('id').eq('barber_id',barberId).eq('off_date',dayStr).maybeSingle();
    if(existing){
      const {error}=await sb.from('barber_days_off').delete().eq('id',existing.id);
      if(error){ alert(error.message); return; }
    } else {
      const has=dayBookings.some(b=>b.barber_id===barberId && b.status!=='cancelled');
      if(has && !confirm('ამ დღეს ბარბერს უკვე აქვს ჯავშნები. დასვენებად მონიშვნა მხოლოდ ახალ ჯავშნებს შეაჩერებს (არსებული რჩება). გავაგრძელო?')) return;
      const {error}=await sb.from('barber_days_off').insert({barber_id:barberId, off_date:dayStr});
      if(error){ alert(error.message); return; }
    }
    render();
  }

  function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  /* ════════════ FINANCES — barbers' salaries (read-only) + manual ledger ════════════ */
  let finEntries=[];
  function finRange(){
    if(finPeriod==='month'){
      const s=new Date(curDate.getFullYear(),curDate.getMonth(),1);
      const e=new Date(curDate.getFullYear(),curDate.getMonth()+1,1);
      return {start:ymd(s), end:ymd(e), label:monthName(curDate)};
    }
    const n=new Date(curDate); n.setDate(n.getDate()+1);
    return {start:ymd(curDate), end:ymd(n), label:fmtDate(curDate)};
  }
  const shortD = s => { const [y,m,d]=s.split('-'); return `${+d}/${+m}`; };

  async function renderFinance(){
    const {start,end,label}=finRange();
    $('curDate').textContent=label;
    $('finSalHint').textContent='შესრულებული ჯავშნებიდან';

    const [bkR,enR]=await Promise.all([
      sb.from('bookings').select('barber_id,services(price)')
        .gte('starts_at',start+'T00:00:00').lt('starts_at',end+'T00:00:00').eq('status','done'),
      sb.from('finance_entries').select('*')
        .gte('entry_date',start).lt('entry_date',end)
        .order('entry_date',{ascending:false}).order('created_at',{ascending:false})
    ]);
    if(bkR.error){ $('finSalaries').innerHTML=`<tbody><tr><td class="fin-empty">${esc(bkR.error.message)}</td></tr></tbody>`; return; }
    const rows=bkR.data||[]; finEntries=enR.data||[];

    const agg={}; barbers.forEach(b=>agg[b.id]={count:0,gross:0});
    rows.forEach(r=>{ const a=agg[r.barber_id]; if(a){ a.count++; a.gross+=(r.services&&r.services.price)||0; } });

    // salary = barber's share; only the final amount is shown (no %, no totals revenue)
    let salaryTotal=0, totalCount=0;
    const salRows=barbers.map(b=>{
      const a=agg[b.id], pct=(b.commission_pct==null?50:b.commission_pct), salary=a.gross*pct/100;
      salaryTotal+=salary; totalCount+=a.count;
      return `<tr>
        <td class="nm">${esc(b.name_ka)}</td>
        <td class="num">${a.count}</td>
        <td class="num">${money(salary)}</td>
      </tr>`;
    }).join('');
    $('finSalaries').innerHTML=
      `<thead><tr><th>ბარბერი</th><th>შესრ.</th><th>ხელფასი</th></tr></thead>
       <tbody>${salRows}
       <tr><td class="nm">ჯამი</td><td class="num">${totalCount}</td><td class="num">${money(salaryTotal)}</td></tr>
       </tbody>`;

    // ── manual ledger: income / expense subtotal + list ──
    let manualIncome=0, manualExpense=0;
    finEntries.forEach(e=>{ if(e.kind==='income') manualIncome+=(+e.amount); else manualExpense+=(+e.amount); });
    const r=(k,v,cls='')=>`<div class="row"><span class="k">${k}</span><span class="v ${cls}">${v}</span></div>`;
    $('finEntriesSum').innerHTML=
      r('დამატებითი შემოსავალი', money(manualIncome),'plus') +
      r('ხარჯები', '– '+money(manualExpense),'minus');

    if(!finEntries.length){
      $('finEntries').innerHTML='<p class="fin-empty">ჩანაწერი არ არის — დაამატე ხარჯი ან შემოსავალი</p>';
    } else {
      $('finEntries').innerHTML=finEntries.map(e=>`
        <div class="entry-row">
          <span class="badge ${e.kind==='income'?'in':'ex'}">${e.kind==='income'?'+':'–'}</span>
          <span class="cat">${esc(e.category)}</span>
          <span class="lbl">${e.label?esc(e.label)+' · ':''}${shortD(e.entry_date)}</span>
          <span class="amt">${money(e.amount)}</span>
          <button class="eb" data-edit="${e.id}" title="ჩასწორება">&#9998;</button>
          <button class="eb del" data-del="${e.id}" title="წაშლა">&times;</button>
        </div>`).join('');
    }
  }

  // ledger row actions (edit / delete)
  $('finEntries').addEventListener('click', async e=>{
    const ed=e.target.closest('[data-edit]'), dl=e.target.closest('[data-del]');
    if(ed) return openEntry(finEntries.find(x=>x.id===ed.dataset.edit));
    if(dl){
      if(!confirm('წავშალო ეს ჩანაწერი?')) return;
      const {error}=await sb.from('finance_entries').delete().eq('id',dl.dataset.del);
      if(error){ alert(error.message); return; }
      renderFinance();
    }
  });

  /* ---------- finance entry modal ---------- */
  const eModal=$('eModal');
  function setEKind(k){
    eKind=k;
    [...$('eKind').children].forEach(b=>b.classList.toggle('on',b.dataset.kind===k));
    const cats=k==='income'?INCOME_CATS:EXPENSE_CATS;
    $('eCategory').innerHTML=cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  }
  $('eKind').addEventListener('click',e=>{ const b=e.target.closest('[data-kind]'); if(b) setEKind(b.dataset.kind); });
  $('eClose').addEventListener('click',()=>eModal.classList.add('hide'));
  eModal.addEventListener('click',e=>{ if(e.target===eModal) eModal.classList.add('hide'); });
  $('addEntryBtn').addEventListener('click',()=>openEntry());

  function openEntry(en){
    editId = en?en.id:null;
    $('eTitle').textContent = en?'ჩანაწერის ჩასწორება':'ახალი ჩანაწერი';
    setEKind(en?en.kind:'income');
    if(en){ $('eCategory').value=en.category; }
    $('eDate').value = en?en.entry_date:(finPeriod==='month'?ymd(curDate):finRange().start);
    $('eAmount').value = en?en.amount:'';
    $('eLabel').value = en?(en.label||''):'';
    $('eErr').textContent='';
    eModal.classList.remove('hide');
  }

  $('eSave').addEventListener('click', async ()=>{
    $('eErr').textContent='';
    const amount=+$('eAmount').value, date=$('eDate').value, category=$('eCategory').value, label=$('eLabel').value.trim();
    if(!date){ $('eErr').textContent='აირჩიე თარიღი'; return; }
    if(!(amount>0)){ $('eErr').textContent='შეიყვანე თანხა'; return; }
    const rec={ entry_date:date, kind:eKind, category, label:label||null, amount };
    const btn=$('eSave'); btn.disabled=true; btn.textContent='ინახება…';
    const {error}= editId
      ? await sb.from('finance_entries').update(rec).eq('id',editId)
      : await sb.from('finance_entries').insert(rec);
    btn.disabled=false; btn.textContent='შენახვა';
    if(error){ $('eErr').textContent=error.message; return; }
    eModal.classList.add('hide'); renderFinance();
  });

  /* ---------- click: booking actions, hours, & empty-slot add ---------- */
  $('cal').addEventListener('click', e=>{
    const av=e.target.closest('.avail-btn');
    if(av){ toggleAvail(av.dataset.avail); return; }
    const hb=e.target.closest('.hours-btn');
    if(hb){ openHours(hb.dataset.hours); return; }
    if(suppressClick){ suppressClick=false; return; }
    const blk=e.target.closest('.bk');
    if(blk && blk.dataset.id){ openBkActions(blk.dataset.id); return; }
    const col=e.target.closest('.col-body');
    if(col && col.dataset.barber){
      const y=e.offsetY; const min=OPEN*60 + Math.round((y/PPM)/15)*15;
      openModal(col.dataset.barber, Math.min(Math.max(min,OPEN*60),CLOSE*60-15));
    }
  });

  /* ---------- drag a booking: RESIZE (bottom edge) or MOVE (body → time/barber) ---------- */
  let suppressClick=false, drag=null;
  const snap5 = m => Math.round(m/5)*5;
  const MOVE_THRESHOLD=6;
  const overlapMsg = (error,what) => (error.code==='23P01'||/overlap|exclusion/i.test(error.message||''))
    ? `ეს დრო უკვე დაკავებულია — ${what} ვერ მოხერხდა` : error.message;

  $('cal').addEventListener('pointerdown', e=>{
    if(e.button && e.button!==0) return;                    // left-click / touch only
    const blk=e.target.closest('.bk'); if(!blk||!blk.dataset.id) return;
    const bk=dayBookings.find(x=>x.id===blk.dataset.id); if(!bk||bk.status==='done') return;
    const startMin=minOf(bk.starts_at), endMin=minOf(bk.ends_at);
    const handle=e.target.closest('.bk-resize');
    if(handle){                                             // RESIZE
      e.preventDefault(); e.stopPropagation();
      drag={ mode:'resize', id:bk.id, blk, startY:e.clientY, topMin:startMin, endMin, newEnd:endMin };
      blk.classList.add('resizing'); handle.setPointerCapture(e.pointerId);
    } else {                                                // MOVE (after threshold)
      const rect=blk.getBoundingClientRect();
      drag={ mode:'move', id:bk.id, blk, startX:e.clientX, startY:e.clientY,
             grabDY:e.clientY-rect.top, dur:endMin-startMin,
             barberId:bk.barber_id, startMin, newStart:startMin, active:false };
      blk.setPointerCapture(e.pointerId);
    }
  });

  $('cal').addEventListener('pointermove', e=>{
    if(!drag) return;
    if(drag.mode==='resize'){
      const delta=(e.clientY-drag.startY)/PPM;
      let end=snap5(drag.endMin+delta);
      end=Math.max(drag.topMin+10, Math.min(end, CLOSE*60));
      drag.newEnd=end;
      drag.blk.style.height=Math.max((end-drag.topMin)*PPM-3,30)+'px';
      return;
    }
    // MOVE — only activate once the pointer has clearly moved
    if(!drag.active){
      if(Math.abs(e.clientX-drag.startX)<MOVE_THRESHOLD && Math.abs(e.clientY-drag.startY)<MOVE_THRESHOLD) return;
      drag.active=true; drag.blk.classList.add('dragging'); drag.blk.style.pointerEvents='none';
    }
    e.preventDefault();
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const col=el && el.closest('.col-body[data-barber]');
    if(col){
      if(col!==drag.blk.parentElement){
        drag.blk.parentElement && drag.blk.parentElement.classList.remove('drop-target');
        col.appendChild(drag.blk); col.classList.add('drop-target');
      }
      drag.barberId=col.dataset.barber;
      let topPx=e.clientY-col.getBoundingClientRect().top-drag.grabDY;
      let st=snap5(OPEN*60 + topPx/PPM);
      st=Math.max(OPEN*60, Math.min(st, CLOSE*60-drag.dur));
      drag.newStart=st;
      drag.blk.style.top=((st-OPEN*60)*PPM)+'px';
    }
  });

  async function endDrag(){
    if(!drag) return;
    const cur=drag; drag=null;
    document.querySelectorAll('.col-body.drop-target').forEach(c=>c.classList.remove('drop-target'));
    if(cur.mode==='resize'){
      cur.blk.classList.remove('resizing');
      if(cur.newEnd===cur.endMin) return;
      suppressClick=true;
      const ends=`${ymd(curDate)}T${hhmmM(cur.newEnd)}:00`;
      const {error}=await sb.from('bookings').update({ends_at:ends}).eq('id',cur.id);
      if(error) alert(overlapMsg(error,'სიგრძის შეცვლა'));
      render(); return;
    }
    // MOVE
    cur.blk.classList.remove('dragging'); cur.blk.style.pointerEvents='';
    if(!cur.active) return;                                  // was a tap → let click open the sheet
    suppressClick=true;
    const bk=dayBookings.find(x=>x.id===cur.id);
    if(cur.newStart===cur.startMin && bk && cur.barberId===bk.barber_id){ render(); return; }
    const starts=`${ymd(curDate)}T${hhmmM(cur.newStart)}:00`;
    const ends=`${ymd(curDate)}T${hhmmM(cur.newStart+cur.dur)}:00`;
    const {error}=await sb.from('bookings').update({barber_id:cur.barberId, starts_at:starts, ends_at:ends}).eq('id',cur.id);
    if(error) alert(overlapMsg(error,'გადატანა'));
    render();
  }
  $('cal').addEventListener('pointerup', endDrag);
  $('cal').addEventListener('pointercancel', endDrag);

  /* ---------- per-day working hours modal ---------- */
  const hrsModal=$('hrsModal');
  function closeHours(){ hrsModal.classList.add('hide'); }
  $('hClose').addEventListener('click',closeHours);
  hrsModal.addEventListener('click',e=>{ if(e.target===hrsModal) closeHours(); });
  function openHours(barberId){
    const b=barbers.find(x=>x.id===barberId); if(!b) return;
    const dh=dayHoursMap[barberId];
    hrsModal.dataset.barber=barberId;
    $('hSub').textContent=`${b.name_ka} · ${fmtDate(curDate)}`;
    $('hOpen').value=(dh?dh.open:'11:00:00').slice(0,5);
    $('hClose2').value=(dh?dh.close:'20:00:00').slice(0,5);
    $('hErr').textContent='';
    hrsModal.classList.remove('hide');
  }
  $('hSave').addEventListener('click', async ()=>{
    $('hErr').textContent='';
    const barberId=hrsModal.dataset.barber, open=$('hOpen').value, close=$('hClose2').value;
    if(!open||!close){ $('hErr').textContent='შეავსე ორივე საათი'; return; }
    if(open>=close){ $('hErr').textContent='დაწყება დასრულებაზე ადრე უნდა იყოს'; return; }
    const btn=$('hSave'); btn.disabled=true; btn.textContent='ინახება…';
    const {error}=await sb.from('barber_day_hours')
      .upsert({barber_id:barberId, work_date:ymd(curDate), open_time:open, close_time:close},
              {onConflict:'barber_id,work_date'});
    btn.disabled=false; btn.textContent='შენახვა';
    if(error){ $('hErr').textContent=error.message; return; }
    closeHours(); render();
  });
  $('hReset').addEventListener('click', async ()=>{
    const barberId=hrsModal.dataset.barber;
    const {error}=await sb.from('barber_day_hours').delete()
      .eq('barber_id',barberId).eq('work_date',ymd(curDate));
    if(error){ $('hErr').textContent=error.message; return; }
    closeHours(); render();
  });

  /* ---------- booking action sheet ---------- */
  const bkModal=$('bkModal');
  function closeBk(){ bkModal.classList.add('hide'); }
  $('bkClose').addEventListener('click',closeBk);
  bkModal.addEventListener('click',e=>{ if(e.target===bkModal) closeBk(); });

  function renderBkActions(done){
    $('bkActions').innerHTML = (done
        ? `<button class="btn-act undo" data-act="undo">&#8634; დააბრუნე აქტიურში</button>`
        : `<button class="btn-act done" data-act="paystart">&#10003; შესრულდა</button>`)
      + `<button class="btn-act cancel" data-act="cancel">&times; გააუქმე ჯავშანი</button>`;
  }
  function showPayMethods(){
    $('bkActions').innerHTML =
      `<div class="pay-q">როგორ გადაიხადა?</div>
       <button class="btn-act pay-cash" data-act="pay-cash">ქეში</button>
       <button class="btn-act" data-act="pay-card">ბარათით</button>
       <button class="btn-act ghost" data-act="payback">&#8592; უკან</button>`;
  }
  function showBanks(){
    $('bkActions').innerHTML =
      `<div class="pay-q">რომელი ბანკით?</div>
       <button class="btn-act pay-bog" data-act="pay-bog">საქართველოს ბანკი</button>
       <button class="btn-act pay-tbc" data-act="pay-tbc">თიბისი ბანკი</button>
       <button class="btn-act ghost" data-act="paymethods">&#8592; უკან</button>`;
  }

  function openBkActions(id){
    const bk=dayBookings.find(x=>x.id===id); if(!bk) return;
    bkModal.dataset.id=id;
    const done=bk.status==='done';
    const payTag = done && bk.payment_method ? ' · '+PAY_LABEL[bk.payment_method] : '';
    $('bkTitle').textContent=bk.customer_name;
    const price = bk.services && bk.services.price!=null ? `<span class="svc-price">${esc(bk.services.price)} ₾</span>` : '';
    $('bkInfo').innerHTML=
      `${price}
       <div class="svc-l">${bk.services?esc(bk.services.name_ka):''}</div>
       <div class="meta">${hhmm(bk.starts_at)}–${hhmm(bk.ends_at)}<br>
       <a href="tel:${esc(bk.customer_phone)}">${esc(bk.customer_phone)}</a></div>
       ${done?`<div class="done-tag">&#10003; შესრულებული${payTag}</div>`:''}`;
    renderBkActions(done);
    bkModal.classList.remove('hide');
  }

  async function setBooking(id, patch, btn){
    if(btn) btn.disabled=true;
    const {error}=await sb.from('bookings').update(patch).eq('id',id);
    if(error){ alert(error.message); if(btn) btn.disabled=false; return; }
    closeBk(); render();
  }

  $('bkActions').addEventListener('click', async e=>{
    const btn=e.target.closest('.btn-act'); if(!btn) return;
    const id=bkModal.dataset.id, a=btn.dataset.act;
    if(a==='paystart'){ showPayMethods(); return; }
    if(a==='pay-card'){ showBanks(); return; }
    if(a==='paymethods'){ showPayMethods(); return; }
    if(a==='payback'){ renderBkActions(false); return; }
    if(a==='cancel'){ if(!confirm('გავაუქმო ეს ჯავშანი?')) return; return setBooking(id,{status:'cancelled'},btn); }
    if(a==='undo')      return setBooking(id,{status:'confirmed',payment_method:null},btn);
    if(a==='pay-cash')  return setBooking(id,{status:'done',payment_method:'cash'},btn);
    if(a==='pay-bog')   return setBooking(id,{status:'done',payment_method:'bog'},btn);
    if(a==='pay-tbc')   return setBooking(id,{status:'done',payment_method:'tbc'},btn);
  });

  /* ---------- add-booking modal ---------- */
  const modal=$('modal');
  function closeModal(){ modal.classList.add('hide'); }
  $('mClose').addEventListener('click',closeModal);
  modal.addEventListener('click',e=>{ if(e.target===modal) closeModal(); });
  ['mBarber','mService','mDate'].forEach(id=>$(id).addEventListener('change',refreshTimes));

  async function computeSlots(barberId,dateStr,dur){
    const weekday=new Date(dateStr+'T00:00:00').getDay();
    const [{data:wh},{data:dh}]=await Promise.all([
      sb.from('working_hours').select('open_time,close_time').eq('barber_id',barberId).eq('weekday',weekday).maybeSingle(),
      sb.from('barber_day_hours').select('open_time,close_time').eq('barber_id',barberId).eq('work_date',dateStr).maybeSingle()
    ]);
    const eff = dh || wh;            // per-date override wins over weekly schedule
    if(!eff) return null; // off that day
    const {data:busy}=await sb.rpc('busy_slots',{p_barber:barberId,p_date:dateStr});
    const toMin=hms=>{const[h,m]=hms.split(':');return (+h)*60+(+m);};
    const open=toMin(eff.open_time), close=toMin(eff.close_time), step=15;
    const ranges=(busy||[]).map(b=>[minOf(b.starts_at),minOf(b.ends_at)]);
    const out=[];
    for(let st=open; st+dur<=close; st+=step){
      const en=st+dur;
      if(ranges.some(([bs,be])=>st<be&&en>bs)) continue;
      out.push(st);
    }
    return out;
  }

  async function refreshTimes(keepMin){
    const bid=$('mBarber').value, svc=services.find(s=>s.id===$('mService').value), date=$('mDate').value;
    const sel=$('mTime');
    if(!bid||!svc||!date){ sel.innerHTML=''; return; }
    sel.innerHTML='<option>…</option>';
    const slots=await computeSlots(bid,date,svc.duration_min);
    if(slots===null){ sel.innerHTML='<option value="">ამ დღეს ბარბერი ისვენებს</option>'; return; }
    if(!slots.length){ sel.innerHTML='<option value="">თავისუფალი დრო არ არის</option>'; return; }
    sel.innerHTML=slots.map(m=>`<option value="${hhmmM(m)}">${hhmmM(m)}</option>`).join('');
    if(keepMin!=null){ const v=hhmmM(keepMin); if([...sel.options].some(o=>o.value===v)) sel.value=v; }
  }

  async function openModal(prefillBarber, prefillMin){
    $('mBarber').value = prefillBarber || $('barberFilter').value || (barbers[0]&&barbers[0].id) || '';
    $('mService').value = services[0]?services[0].id:'';
    $('mDate').value = ymd(curDate);
    $('mName').value=''; $('mPhone').value=''; $('mErr').textContent='';
    modal.classList.remove('hide');
    await refreshTimes(prefillMin);
  }

  $('mSave').addEventListener('click', async ()=>{
    $('mErr').textContent='';
    const bid=$('mBarber').value, svc=services.find(s=>s.id===$('mService').value);
    const date=$('mDate').value, time=$('mTime').value;
    const name=$('mName').value.trim(), phone=$('mPhone').value.trim();
    if(!name||!phone){ $('mErr').textContent='შეავსე სახელი და ტელეფონი'; return; }
    if(!time){ $('mErr').textContent='აირჩიე თავისუფალი დრო'; return; }
    const st=(+time.split(':')[0])*60+(+time.split(':')[1]), en=st+svc.duration_min;
    const starts=`${date}T${hhmmM(st)}:00`, ends=`${date}T${hhmmM(en)}:00`;
    const btn=$('mSave'); btn.disabled=true; btn.textContent='ემატება…';
    const {error}=await sb.from('bookings').insert({
      barber_id:bid, service_id:svc.id, customer_name:name, customer_phone:phone,
      starts_at:starts, ends_at:ends, status:'confirmed'
    });
    btn.disabled=false; btn.textContent='დამატება';
    if(error){
      $('mErr').textContent = (error.code==='23P01'||/overlap|exclusion/i.test(error.message||''))
        ? 'ეს დრო უკვე დაკავებულია — აირჩიე სხვა' : error.message;
      if(error.code==='23P01') refreshTimes();
      return;
    }
    closeModal(); render();
  });

  /* ---------- session check on load ---------- */
  (async function(){
    const {data:{session}}=await sb.auth.getSession();
    if(session) boot();
  })();
})();
</script>
</body>
</html>
